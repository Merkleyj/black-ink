function previousRange(){
  const r=activeRange();
  const s=new Date(r.start+'T00:00:00'), e=new Date(r.end+'T00:00:00');
  const days=Math.round((e-s)/864e5)+1;
  const pe=new Date(s.getTime()-864e5);
  const ps=new Date(pe.getTime()-(days-1)*864e5);
  return {start:toISODate(ps), end:toISODate(pe)};
}
function txInRange(r){
  const ids=new Set(filteredAccountIds());
  return S.transactions.filter(t=>t.date>=r.start&&t.date<=r.end&&ids.has(t.accountId));
}
function deltaHTML(cur,prev,goodUp=true,asMoney=true){
  if(filter.preset==='all') return '';
  const d=cur-prev;
  if(Math.abs(d)<0.01) return `<div class="delta flat">— no change</div>`;
  const up=d>0; const good = goodUp? up : !up;
  const arrow=up?'▲':'▼';
  const val=asMoney?money(Math.abs(d)):pct(Math.abs(d),1);
  return `<div class="delta ${good?'up':'down'}">${arrow} ${val} vs prior period</div>`;
}
function kpi(lbl,val,delta='',valClass='',tipText=''){
  return `<div class="kpi"><div class="lbl">${esc(lbl)}${tipText?' '+tip(tipText,'ⓘ'):''}</div>
    <div class="val ${valClass}">${val}</div>${delta}</div>`;
}

function totalCash(){ return S.accounts.filter(a=>['checking','savings','cash'].includes(a.type)&&a.includeInNetWorth!==false&&a.active!==false).reduce((s,a)=>s+accountBalance(a),0); }
function balByType(type){ return S.accounts.filter(a=>a.type===type&&a.active!==false).reduce((s,a)=>s+accountBalance(a),0); }
function totalDebt(){
  const cardBal=S.accounts.filter(a=>a.type==='credit'&&a.active!==false).reduce((s,a)=>s+Math.max(0,-accountBalance(a)),0);
  const loanBal=S.debts.reduce((s,d)=>s+(Number(d.currentBalance)||0),0);
  return cardBal+loanBal;
}
function totalInvest(){ return S.investments.reduce((s,inv)=>s+invValue(inv),0); }
function invValue(inv){ return (inv.holdings||[]).reduce((s,h)=>s+(Number(h.currentValue)|| (Number(h.quantity)||0)*(Number(h.currentPrice)||0) ),0); }
function netWorth(){
  const assets=totalCash()+totalInvest()+S.manualAssets.filter(a=>a.kind!=='liability').reduce((s,a)=>s+(Number(a.value)||0),0);
  const liab=totalDebt()+S.manualAssets.filter(a=>a.kind==='liability').reduce((s,a)=>s+(Number(a.value)||0),0);
  return {assets,liab,net:assets-liab};
}

function debtPaymentsThisMonth(){
  const r=activeRange();
  let paid=0;
  S.debts.forEach(d=>(d.payments||[]).forEach(p=>{ if(p.date>=r.start&&p.date<=r.end) paid+=(Number(p.actualPaid)||0)+(Number(p.extraPrincipal)||0); }));
  // also count card payments treated as transfers? Keep to logged debt payments + tx categorized as Debt payments
  const ids=new Set(filteredAccountIds());
  S.transactions.filter(t=>t.date>=r.start&&t.date<=r.end&&ids.has(t.accountId)&&t.category==='Debt payments').forEach(t=>paid+=Math.abs(t.amount));
  return paid;
}
function minPaymentsDue(){ return S.debts.reduce((s,d)=>s+(Number(d.minPayment)||0),0); }
function investContribThisPeriod(){
  const r=activeRange();
  let c=0;
  S.investments.forEach(inv=>(inv.holdings||[]).forEach(h=>{ (h.activity||[]).forEach(a=>{ if(a.type==='contribution'&&a.date>=r.start&&a.date<=r.end) c+=Number(a.amount)||0; }); }));
  return c;
}

function last6Months(){ const out=[]; const d=new Date(); for(let i=5;i>=0;i--){ out.push(monthKey(new Date(d.getFullYear(),d.getMonth()-i,1))); } return out; }

function emergencyMonths(){
  const cash=balByType('savings')+balByType('checking')*0; // emergency fund ≈ savings
  const ess=essentialMonthly();
  if(ess<=0) return null;
  return (balByType('savings'))/ess;
}
function essentialMonthly(){
  // average of last 3 months "need" + "debt" spending
  const months=last6Months().slice(-3); let total=0,n=0;
  months.forEach(mk=>{ const a=analyze(monthTx(mk)); total+=a.needsWants.need+a.needsWants.debt; n++; });
  return n? total/n : 0;
}

function getTxRows(){
  let rows=filteredTx();
  if(txView.cat!=='all'){ rows=rows.filter(t=> txView.cat==='Uncategorized' ? (!t.category && !isTransfer(t)) : t.category===txView.cat); }
  if(txView.cat!=='all' && txView.sub && txView.sub!=='all'){
    rows=rows.filter(t=> txView.sub==='(unspecified)' ? !(t.subcategory&&t.subcategory.trim()) : t.subcategory===txView.sub);
  }
  if(txView.type!=='all'){
    rows=rows.filter(t=> txView.type==='transfer'? isTransfer(t) : (!isTransfer(t) && (t.kind||t.flow)===txView.type));
  }
  if(txView.reviewOnly){ rows=rows.filter(t=>t.needsReview); }
  const q=txView.search.trim().toLowerCase();
  if(q){ rows=rows.filter(t=> (t.merchant||'').toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q) || (t.category||'').toLowerCase().includes(q) || (t.notes||'').toLowerCase().includes(q) || String(t.amount).includes(q)); }
  const dir=txView.dir==='asc'?1:-1;
  rows.sort((a,b)=>{
    let x,y;
    switch(txView.sort){ case 'amount': x=a.amount;y=b.amount;break; case 'merchant': x=(a.merchant||'').toLowerCase();y=(b.merchant||'').toLowerCase();break; case 'category': x=(a.category||'');y=(b.category||'');break; default: x=a.date;y=b.date; }
    return x<y?-1*dir:x>y?1*dir:0;
  });
  return rows;
}

function openSplitEditor(id){
  const t=S.transactions.find(x=>x.id===id); if(!t) return;
  const tot=Math.abs(Number(t.amount)||0);
  if(!splitDraft || splitDraft.txId!==id){
    splitDraft={ txId:id, lines:(Array.isArray(t.splits)&&t.splits.length)
      ? t.splits.map(s=>({amount:Math.abs(Number(s.amount)||0), sub:s.subcategory||''}))

function addSplitLine(id){ const t=S.transactions.find(x=>x.id===id); const tot=Math.abs(Number(t.amount)||0);
  const sum=splitDraft.lines.reduce((s,l)=>s+(Number(l.amount)||0),0);
  splitDraft.lines.push({amount:Math.max(0,+(tot-sum).toFixed(2)), sub:''}); renderSplitEditor(id); }
function renderSplitEditor(id){
  const t=S.transactions.find(x=>x.id===id); const tot=Math.abs(Number(t.amount)||0);
  const sum=+(splitDraft.lines.reduce((s,l)=>s+(Number(l.amount)||0),0)).toFixed(2);
  const diff=+(tot-sum).toFixed(2);
  const rows=splitDraft.lines.map((l,i)=>`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input type="number" step="0.01" value="${l.amount}" style="width:120px;text-align:right" onchange="splitDraft.lines[${i}].amount=parseFloat(this.value)||0; renderSplitEditor('${id}')">
      <select style="flex:1" onchange="splitDraft.lines[${i}].sub=this.value; renderSplitEditor('${id}')"><option value="">— choose category —</option>${splitSubOptions(l.sub)}</select>
      ${splitDraft.lines.length>1?`<button class="icon-btn danger" title="Remove line" onclick="splitDraft.lines.splice(${i},1); renderSplitEditor('${id}')">\u00D7</button>`:'<span style="width:26px"></span>'}
    </div>`).join('');
  const balanced=Math.abs(diff)<0.01;
  openModal(`<div class="mhd"><h3>Split transaction</h3><button class="x" onclick="splitDraft=null;closeModal()">\u00D7</button></div>
  <div class="mbd">

let budgetExpanded = new Set();   // category names whose subcategories are shown
let budDrill = null;
let budChartMode='bar';  // 'bar' | 'pie'              // category to break down in the chart, or null

function activeMonthKey(){
  if(isSingleMonth()) return activeRange().start.slice(0,7);
  return monthKey(new Date());
}
/* Look up any budget key (category name, or "Category › Subcategory"): month override else recurring. */
function budgetValue(mk,key){
  const m=S.budgets.months[mk]||{};
  if(m[key]!=null) return m[key];
  return S.budgets.recurring[key]!=null ? S.budgets.recurring[key] : 0;
}
const SUBSEP=' › ';
function subKey(cat,sub){ return cat+SUBSEP+sub; }
function budgetForMonth(mk){
  const out={};
  S.categories.filter(c=>c.kind==='expense').forEach(c=>{
    let sum=0; (c.subs||[]).forEach(s=>{ sum+=budgetValue(mk, subKey(c.name,s)); });
    out[c.name]=sum;
  });
  return out;
}
function monthsInRange(){
  const r=activeRange();
  const s=new Date(r.start+'T00:00:00'), e=new Date(r.end+'T00:00:00');
  const out=[]; let cur=new Date(s.getFullYear(),s.getMonth(),1), guard=0;
  while(cur<=e && guard<240){
    const mStart=new Date(cur.getFullYear(),cur.getMonth(),1);
    const mEnd=new Date(cur.getFullYear(),cur.getMonth()+1,0);
    const dim=mEnd.getDate();
    const ovStart=mStart>s?mStart:s, ovEnd=mEnd<e?mEnd:e;
    const days=Math.max(0,Math.round((ovEnd-ovStart)/864e5)+1);
    out.push({mk:monthKey(cur), fraction:Math.min(1, days/dim)});
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1); guard++;
  }
  return out;
}
function budgetForRangeKey(key){
  if(filter.preset==='all' || isSingleMonth()) return Number(budgetValue(activeMonthKey(),key))||0;
  return monthsInRange().reduce((s,m)=> s + (Number(budgetValue(m.mk,key))||0)*m.fraction, 0);
}
function budgetForRangeCat(catName){
  const c=S.categories.find(x=>x.name===catName); if(!c) return 0;
  return (c.subs||[]).reduce((s,sub)=> s + budgetForRangeKey(subKey(catName,sub)), 0);
}
/* Transactions in the equal-length period immediately before the active range. */
function prevRangeTx(){
  const r=activeRange();
  const s=new Date(r.start+'T00:00:00'), e=new Date(r.end+'T00:00:00');
  const len=Math.round((e-s)/864e5)+1;
  const pe=new Date(s.getTime()-864e5);
  const ps=new Date(pe.getTime()-(len-1)*864e5);
  const psI=toISODate(ps), peI=toISODate(pe);
  const ids=new Set(filteredAccountIds());
  return S.transactions.filter(t=>t.date && t.date>=psI && t.date<=peI && ids.has(t.accountId));
}
function monthsAggregateFactor(){
  // how many months the active range actually covers (avg month = 30.44 days)
  const r=activeRange();
  const s=new Date(r.start+'T00:00:00'), e=new Date(r.end+'T00:00:00');
  const days=(e-s)/864e5 + 1;
  return Math.max(1, Math.round(days/30.44));
}
function computeBudgetRemaining(){
  let totalBud=0;
  S.categories.filter(c=>c.kind==='expense').forEach(c=>{ totalBud+=budgetForRangeCat(c.name); });
  const a=analyze(filteredTx());
  return {budget:totalBud, spent:a.spending, remaining:totalBud-a.spending};
}

function viewBudget(){

  const bud={}; S.categories.filter(c=>c.kind==='expense').forEach(c=>{ bud[c.name]=budgetForRangeCat(c.name); });
  const a=analyze(filteredTx());
  const totalBud=Object.values(bud).reduce((x,y)=>x+y,0);
  const overCount=S.categories.filter(c=>c.kind==='expense'&&(a.byCat[c.name]||0)>(bud[c.name])&&bud[c.name]>0).length;

  const tAct=transferOutBySub(filteredTx());

/* Actual money-out transfers per subcategory for a set of transactions —
   the "actual" side of planned debt/savings transfers. Split lines with the
   Transfers category count by their own subcategory. */
function transferOutBySub(txs){
  const out={};
  txs.forEach(t=>{
    if(signedAmount(t)>=0) return; // money-out only
    if(Array.isArray(t.splits) && t.splits.length){
      t.splits.forEach(s=>{ if(isTransferCat(s.category||'')){ const k=s.subcategory||'(unspecified)'; out[k]=(out[k]||0)+Math.abs(Number(s.amount)||0); } });
    } else if(isTransfer(t)){
      const k=t.subcategory||'(unspecified)'; out[k]=(out[k]||0)+Math.abs(Number(t.amount)||0);
    }
  });
  return out;
}
/* Actual income attributed by subcategory (uses budgetLines, so refunds and
   splits are handled the same way as everywhere else). */
function incomeBySub(txs){
  const out={};
  txs.forEach(t=>{ for(const L of budgetLines(t)){ if(L.dir==='income'){ const k=L.subcategory||'(unspecified)'; out[k]=(out[k]||0)+L.amount; } } });
  return out;
}

/* Width-aware money axis: wider chart -> finer tick steps (count by $25
   instead of $50), and the max rounds UP to just the next step so the top
   label stays a round number while the longest bar still nearly fills the
   width. Returns {max, stepSize} or {} when there's no positive data. */
function moneyAxis(dataMax, canvasId){
  if(!(dataMax>0)) return {};
  const el=document.getElementById(canvasId);
  const w=(el && el.parentElement && el.parentElement.clientWidth) || 700;
  const targetTicks=Math.max(6, Math.min(28, Math.floor(w/45)));
  const steps=[1,2,5,10,25,50,100,250,500,1000,2500,5000,10000,25000,50000];
  let step=steps[steps.length-1];
  for(const s of steps){ if(dataMax/s <= targetTicks){ step=s; break; } }
  return {max: Math.ceil(dataMax/step)*step, stepSize: step};
}
/* Draws each pie's labels directly on its slices ("Food 24%"). Labels that
   don't fit inside their slice get a pointer line out to the side, with
   simple vertical de-overlapping so callouts never stack on each other. */
const pieLabelPlugin={
  id:'pieLabels',
  afterDatasetsDraw(chart){
    const ctx=chart.ctx;
    const meta=chart.getDatasetMeta(0);
    if(!meta || !meta.data || !meta.data.length) return;
    const ds=chart.data.datasets[0];
    const total=(ds.data||[]).reduce((a,b)=>a+(Number(b)||0),0);
    if(total<=0) return;
    ctx.save();
    ctx.font="600 11px Inter, -apple-system, sans-serif";
    const callouts=[];
    meta.data.forEach((arc,i)=>{
      const v=Number(ds.data[i])||0; if(v<=0) return;
      const p=arc.getProps(['x','y','startAngle','endAngle','outerRadius'],true);
      const ang=p.endAngle-p.startAngle;
      const mid=(p.startAngle+p.endAngle)/2;
      const txt=String(chart.data.labels[i])+' '+Math.round(v/total*100)+'%';
      const w=ctx.measureText(txt).width;
      const rIn=p.outerRadius*0.62;
      const fits = ang >= 2*Math.asin(Math.min(0.95,(w/2+5)/Math.max(1,rIn))) && w < p.outerRadius*1.15;
      if(fits){
        ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(txt, p.x+Math.cos(mid)*rIn, p.y+Math.sin(mid)*rIn);
      } else {
        callouts.push({mid,name:String(chart.data.labels[i]),pct:Math.round(v/total*100)+'%',p,color:(Array.isArray(ds.backgroundColor)?ds.backgroundColor[i]:'#64748b')});
      }
    });
    const left=[],right=[];
    callouts.forEach(c=>{ (Math.cos(c.mid)>=0?right:left).push(c); });
    const place=(list,side)=>{
      list.sort((a,b)=>(a.p.y+Math.sin(a.mid)*a.p.outerRadius)-(b.p.y+Math.sin(b.mid)*b.p.outerRadius));
      let lastY=-1e9;
      list.forEach(c=>{
        const sx=c.p.x+Math.cos(c.mid)*c.p.outerRadius;
        const sy=c.p.y+Math.sin(c.mid)*c.p.outerRadius;
        const ex=c.p.x+Math.cos(c.mid)*(c.p.outerRadius+10);
        let ey=c.p.y+Math.sin(c.mid)*(c.p.outerRadius+10);
        if(ey<lastY+13) ey=lastY+13;
        lastY=ey;
        const hx=ex+(side==='right'?14:-14);
        ctx.strokeStyle=c.color; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.lineTo(hx,ey); ctx.stroke();
        // shrink the name (never the %) until the label fits the space that's left
        const avail= side==='right' ? (chart.width-(hx+3)-4) : (hx-3-4);
        let nm=c.name, txt=nm+' '+c.pct;
        while(ctx.measureText(txt).width>avail && nm.length>3){ nm=nm.slice(0,-1); txt=nm+'\u2026 '+c.pct; }
        ctx.fillStyle=cvar('--ink')||'#334155';
        ctx.textAlign= side==='right'?'left':'right'; ctx.textBaseline='middle';
        ctx.fillText(txt, hx+(side==='right'?3:-3), ey);
      });
    };
    place(left,'left'); place(right,'right');
    ctx.restore();
  }
};
/* Two matching pies — planned composition and actual composition — sharing

function makeBudPies(labels,dBud,dAct,suffix){

}

  const months=last6Months();
  const data=months.map(mk=>{

    let debt=0;
    S.accounts.forEach(a=>{ if(a.type==='credit'&&a.active!==false){ let b=Number(a.startingBalance)||0; S.transactions.forEach(t=>{ if(t.accountId===a.id&&t.date<=end) b+=signedAmount(t); }); debt+=Math.max(0,-b); } });
    debt+=S.debts.reduce((s,d)=>s+(Number(d.currentBalance)||0),0);
    return cash+totalInvest()-debt;

/* =====================================================================
   DEBT TRACKER
   ===================================================================== */
const DEBT_TYPES=[['credit','Credit card'],['student','Student loan'],['auto','Auto loan'],['personal','Personal loan'],['mortgage','Mortgage'],['other','Other']];

function monthlyInterest(bal,apr){ return bal*(apr/100)/12; }
// payoff months for a single debt at fixed payment
function payoffMonths(bal,apr,pmt){
  const r=apr/100/12;
  if(pmt<=bal*r+0.01) return Infinity; // never pays off
  if(r===0) return Math.ceil(bal/pmt);
  return Math.ceil(Math.log(pmt/(pmt-bal*r))/Math.log(1+r));
}
/* Effective rate honours a promotional rate while it's still active */
function effectiveApr(d, date){
  const when = date ? new Date(date) : new Date();
  if(d && d.promoExpiration){
    const exp=new Date(d.promoExpiration);
    if(!isNaN(exp.getTime()) && when < exp) return Number(d.promoRate)||0;
  }
  return Number(d.apr)||0;
}
/* Payoff projection that amortises at the promo rate until it expires, then the regular APR */
function payoffMonthsPromo(d, pmt){
  let bal=Number(d.currentBalance)||0;
  if(bal<=0) return 0;
  pmt=Number(pmt)||0;
  if(pmt<=0) return Infinity;
  const apr=Number(d.apr)||0;
  const promoEnd = d.promoExpiration ? new Date(d.promoExpiration) : null;
  const promoOk = promoEnd && !isNaN(promoEnd.getTime());
  if(!promoOk) return payoffMonths(bal, apr, pmt);
  let cur=new Date(); cur=new Date(cur.getFullYear(),cur.getMonth(),1);
  let months=0; const CAP=1200;
  while(bal>0 && months<CAP){
    const r=(((cur<promoEnd?(Number(d.promoRate)||0):apr))/100)/12;
    const principal=pmt-bal*r;
    if(principal<=0) return Infinity;
    bal-=principal; months++;
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);
  }
  return bal<=0?months:Infinity;
}
function totalInterestPaid(bal,apr,pmt){
  const m=payoffMonths(bal,apr,pmt); if(!isFinite(m)) return Infinity;
  return Math.max(0, pmt*m - bal);
}
function payoffDateLabel(months){ if(!isFinite(months)) return 'Never (payment too low)'; const d=new Date(); d.setMonth(d.getMonth()+months); return d.toLocaleDateString('en-US',{month:'short',year:'numeric'})+` (${months} mo)`; }

/* Payoff planner: compare strategies across all debts */
function simulateStrategy(debts, extra, strategy, lump=0){
  // returns {months, totalInterest, schedule:[{month,totalBal}]}
  let list=debts.map(d=>({bal:Number(d.currentBalance)||0,apr:Number(d.apr)||0,min:Number(d.minPayment)||0,name:d.name}))
    .filter(d=>d.bal>0);
  if(strategy==='avalanche') list.sort((a,b)=>b.apr-a.apr);
  else if(strategy==='snowball') list.sort((a,b)=>a.bal-b.bal);
  // apply lump to first target
  if(lump>0 && list.length){ list[0].bal=Math.max(0,list[0].bal-lump); }
  let month=0, totalInterest=0; const schedule=[];
  const baseMin=list.reduce((s,d)=>s+d.min,0);
  let budget=baseMin+extra;
  while(list.some(d=>d.bal>0.01) && month<600){
    month++;
    // accrue interest
    list.forEach(d=>{ if(d.bal>0){ const i=d.bal*d.apr/100/12; d.bal+=i; totalInterest+=i; } });
    // pay minimums
    let pool=budget;
    list.forEach(d=>{ if(d.bal>0){ const p=Math.min(d.min,d.bal,pool); d.bal-=p; pool-=p; } });
    // funnel remaining to target order
    for(const d of list){ if(pool<=0) break; if(d.bal>0){ const p=Math.min(pool,d.bal); d.bal-=p; pool-=p; } }
    schedule.push({month,totalBal:list.reduce((s,d)=>s+Math.max(0,d.bal),0)});
    if(strategy==='minimum') budget=list.reduce((s,d)=>s+(d.bal>0?d.min:0),0); // minimum-only shrinks as debts clear
  }
  return {months:month,totalInterest,schedule, paidOff:!list.some(d=>d.bal>0.01)};
}

function openPayoffPlanner(){
  openModal(`<div class="mhd"><h3>Compare debt payoff strategies</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="mbd">
    <div class="form-grid">
      <div><label class="fld">Extra per month (above minimums)</label><input type="number" step="10" id="ppExtra" value="100" oninput="runPlanner()"></div>
      <div><label class="fld">One-time lump sum (optional)</label><input type="number" step="50" id="ppLump" value="0" oninput="runPlanner()"></div>
    </div>
    <div id="ppResults" style="margin-top:16px"></div>
  </div>
  <div class="mft"><button class="btn" onclick="closeModal()">Close</button></div>`,'wide');
  setTimeout(runPlanner,30);
}
function runPlanner(){
  const extra=parseFloat(document.getElementById('ppExtra').value)||0;
  const lump=parseFloat(document.getElementById('ppLump').value)||0;
  const strategies=[['minimum','Minimum only'],['snowball','Snowball (smallest first)'],['avalanche','Avalanche (highest rate first)']];
  const results=strategies.map(([s,lbl])=>({lbl,s,...simulateStrategy(S.debts,s==='minimum'?0:extra,s,s==='minimum'?0:lump)}));
  const best=results.filter(r=>r.s!=='minimum').sort((a,b)=>a.totalInterest-b.totalInterest)[0];
  const rows=results.map(r=>{
    const isBest=best&&r.s===best.s;
    return `<tr ${isBest?'style="background:var(--teal-soft)"':''}>
      <td><b>${r.lbl}</b>${isBest?' <span class="pill teal">lowest interest</span>':''}</td>
      <td class="r num">${payoffDateLabel(r.months)}</td>
      <td class="r num">${isFinite(r.totalInterest)?money(r.totalInterest):'∞'}</td>
    </tr>`;
  }).join('');
  const min=results.find(r=>r.s==='minimum'), av=results.find(r=>r.s==='avalanche');
  const saved= isFinite(min.totalInterest)&&isFinite(av.totalInterest)? min.totalInterest-av.totalInterest : 0;
  document.getElementById('ppResults').innerHTML=`
    <table><thead><tr><th>Strategy</th><th class="r">Debt-free by</th><th class="r">Total interest</th></tr></thead><tbody>${rows}</tbody></table>
    ${saved>0?`<div class="hint" style="margin-top:12px">Compared with paying minimums only, the avalanche method here saves about <b>${money(saved)}</b> in interest.</div>`:''}
    <div class="infobox" style="margin-top:10px"><b>Avalanche</b> targets the highest interest rate first → usually the least total interest (math-optimal). <b>Snowball</b> targets the smallest balance first → quicker wins for motivation. If a card has a promotional 0% rate expiring soon, prioritizing it before the promo ends can beat both. These are estimates assuming constant rates and no new charges.</div>`;
}

function reviewMonthKey(){
  // Review always works on a single month. Use date-filter month if single, else current month.
  if(isSingleMonth()){ const r=activeRange(); return r.start.slice(0,7); }
  return monthKey(new Date());
}
function txForMonth(mk){
  const ids=new Set(filteredAccountIds());
  return S.transactions.filter(t=>t.date && t.date.slice(0,7)===mk && ids.has(t.accountId));
}
function prevMonthKey(mk){ const [y,m]=mk.split('-').map(Number); return monthKey(new Date(y,m-2,1)); }

function debtPaidInMonth(mk){
  let tot=0; S.debts.forEach(d=>(d.payments||[]).forEach(p=>{ if(p.month===mk) tot+=(Number(p.actualPaid)||0); })); return tot;
}
function debtBalanceChangeInMonth(mk){
  // principal reduction recorded that month
  let chg=0; S.debts.forEach(d=>(d.payments||[]).forEach(p=>{ if(p.month===mk) chg += (Number(p.principal)||0) - (Number(p.newCharges)||0); })); return chg;
}
function investContribInMonth(mk){
  let tot=0; S.investments.forEach(inv=>(inv.holdings||[]).forEach(h=>(h.activity||[]).forEach(a=>{ if(a.type==='contribution' && a.date && a.date.slice(0,7)===mk) tot+=Number(a.amount)||0; }))); return tot;
}

/* Short display name for a transaction's merchant: the matched rule's keyword
   when there is one, else the extracted merchant keyword, else raw text. */
function merchantLabel(t){
  if(t.ruleApplied){ const r=S.rules.find(x=>x.id===t.ruleApplied); if(r && r.value) return String(r.value); }
  const d=t.originalDescription||t.description||t.merchant||'';
  const kw=(typeof suggestKeyword==='function') ? suggestKeyword(d) : '';
  return kw || t.merchant || t.description || '\u2014';
}
function viewReview(){
  const single=isSingleMonth();
  const mk=activeMonthKey();
  const pmk=prevMonthKey(mk);
  const rmonths=monthsInRange().map(m=>m.mk);
  const txs=filteredTx(), ptxs=prevRangeTx();
  const a=analyze(txs), pa=analyze(ptxs);
  const sr=savingsRate(a.income,a.spending);
  const psr=savingsRate(pa.income,pa.spending);
  const periodLabel= single? monthLabel(mk) : rangeLabel();

  // budget over/under across the active range (prorated)
  const over=[], under=[];
  S.categories.filter(c=>c.kind==='expense').forEach(c=>{
    const planned=budgetForRangeCat(c.name); if(planned<=0) return;
    const actual=a.byCat[c.name]||0;
    if(actual>planned) over.push({cat:c.name,planned,actual,diff:actual-planned});
    else under.push({cat:c.name,planned,actual,diff:planned-actual});
  });
  over.sort((x,y)=>y.diff-x.diff); under.sort((x,y)=>y.diff-x.diff);

  // largest expenses
  const expenses=txs.filter(t=>txFlow(t).spending>0).sort((x,y)=>txFlow(y).spending-txFlow(x).spending).slice(0,8);
  // unusual: amount > 2.5x that category's 3-mo average, or > $250 one-off
  const unusual=expenses.filter(t=>{ const avg=avgSpend(t.category,3); const amt=txFlow(t).spending; return (avg>0 && amt>avg*1.6 && amt>80) || amt>400; }).slice(0,6);

  const uncats=txs.filter(t=>(!t.category||t.category==='Uncategorized') && txFlow(t).spending>0).length;

  // upcoming bills (recurring) + debt due dates
  const recurringBills=[...new Map(txs.filter(t=>t.recurring && txFlow(t).spending>0).map(t=>[merchantLabel(t), t])).values()].slice(0,8);
  const debtDue=S.debts.filter(d=>(Number(d.currentBalance)||0)>0).map(d=>({name:d.name,day:d.dueDay||1,amt:Number(d.minPayment)||0})).sort((x,y)=>x.day-y.day);

  // net worth change across the month
  const nwNow=netWorth().net;

  const obs=buildObservations({mk,pmk,a,pa,sr,psr,over,uncats,unusual});

  const dpaid=rmonths.reduce((s,m)=>s+debtPaidInMonth(m),0), dchg=rmonths.reduce((s,m)=>s+debtBalanceChangeInMonth(m),0), icontrib=rmonths.reduce((s,m)=>s+investContribInMonth(m),0);
  // subscriptions within the active range
  const subMap=new Map();
  txs.filter(t=>t.category==='Subscriptions' && txFlow(t).spending>0).forEach(t=>{ const k=merchantLabel(t); const e=subMap.get(k)||{name:k,total:0,count:0,sub:t.subcategory||''}; e.total+=txFlow(t).spending; e.count++; subMap.set(k,e); });
  const subs=[...subMap.values()].sort((x,y)=>y.total-x.total);
  const subTotal=subs.reduce((s,x)=>s+x.total,0);

  return `
  <div class="page-head"><div><h1>Review — ${esc(periodLabel)}</h1>

  <div class="kpi-row">
    ${kpi('Income',money(a.income),deltaHTML(a.income,pa.income,true),'pos',GLOSS.netcashflow)}
    ${kpi('Spending',money(a.spending),deltaHTML(a.spending,pa.spending,false))}
    ${kpi('Net cash flow',money(a.net,true),deltaHTML(a.net,pa.net,true),a.net>=0?'pos':'neg')}
    ${kpi('Savings rate',pct(sr,0),deltaHTML(sr,psr,true,false),sr>=0?'pos':'neg','savingsrate')}
  </div>
  <div class="kpi-row">
    ${kpi('Debt paid',money(dpaid))}
    ${kpi('Debt balance change',money(-dchg,true),'',dchg>0?'pos':'')}
    ${kpi('Investment contributions',money(icontrib))}
    ${kpi('Uncategorized',uncats,uncats?'needs review':'all set',uncats?'warn':'pos')}
  </div>

  <div class="card obs-card">
    <h3>Observations</h3>
    <p class="mini">Generated only from your data for this month. These are neutral observations, not financial advice.</p>
    ${obs.length? `<ul class="obs">${obs.map(o=>`<li class="obs-${o.tone}"><span class="obs-dot"></span>${esc(o.text)}</li>`).join('')}</ul>`
      : `<p class="muted">Nothing notable stood out this month based on the data available.</p>`}
  </div>

  <div class="grid-2">
    <div class="card">
      <h3>Over budget <span class="pill ${over.length?'red':'green'}">${over.length}</span></h3>
      ${over.length? `<table class="tbl compact"><thead><tr><th>Category</th><th class="r">Budget</th><th class="r">Actual</th><th class="r">Over</th></tr></thead><tbody>
        ${over.map(o=>`<tr><td>${esc(o.cat)}</td><td class="r">${money(o.planned)}</td><td class="r">${money(o.actual)}</td><td class="r neg">${money(o.diff)}</td></tr>`).join('')}
      </tbody></table>` : `<p class="muted">No categories exceeded their budget.</p>`}
    </div>
    <div class="card">
      <h3>Under budget <span class="pill green">${under.length}</span></h3>

        ${under.slice(0,8).map(o=>`<tr><td>${esc(o.cat)}</td><td class="r">${money(o.planned)}</td><td class="r">${money(o.actual)}</td><td class="r pos">${money(o.diff)}</td></tr>`).join('')}
      </tbody></table>` : `<p class="muted">No budgets set, or all were exceeded.</p>`}
    </div>
  </div>

  <div class="grid-2">

        ${expenses.map(t=>`<tr><td>${fmtDate(t.date)}</td><td>${esc(merchantLabel(t))}</td><td>${esc(t.category||'Uncategorized')}</td><td class="r">${money(txFlow(t).spending)}</td></tr>`).join('')}

        ${unusual.map(t=>`<tr><td>${fmtDate(t.date)}</td><td>${esc(merchantLabel(t))}</td><td class="r">${money(txFlow(t).spending)}</td></tr>`).join('')}
      </tbody></table>` : `<p class="muted">Nothing flagged as unusual.</p>`}

  </div>

  <div class="grid-2">

        ${recurringBills.map(t=>`<tr><td>${esc(merchantLabel(t))}</td><td>${esc(t.category||'—')}</td><td class="r">${money(txFlow(t).spending)}</td></tr>`).join('')}

    ${subs.length? `<table class="tbl compact"><thead><tr><th>Service</th><th>Type</th><th class="r">Charges</th><th class="r">Total</th></tr></thead><tbody>
      ${subs.map(s=>`<tr><td>${esc(s.name)}</td><td>${esc(s.sub||'—')}</td><td class="r">${s.count}</td><td class="r">${money(s.total)}</td></tr>`).join('')}
    </tbody></table>` : `<p class="muted">No subscriptions found. Categorize recurring services under the Subscriptions category to see them here.</p>`}

  <div class="card">
    <h3>Snapshot</h3>

      <div><span class="ml">Net worth (current)</span><b>${money(nwNow)}</b></div>

function buildObservations(d){
  const o=[];
  const {a,pa,sr,psr,over,uncats,unusual,mk}=d;
  if(pa.spending>0){
    const chg=(a.spending-pa.spending)/pa.spending*100;
    if(chg>=10) o.push({tone:'warn',text:`Spending rose ${pct(Math.abs(chg))} versus the previous period (${money(pa.spending)} → ${money(a.spending)}).`});
    else if(chg<=-10) o.push({tone:'good',text:`Spending fell ${pct(Math.abs(chg))} versus the previous period (${money(pa.spending)} → ${money(a.spending)}).`});
  }
  if(pa.income>0 && a.income>0){
    const ic=(a.income-pa.income)/pa.income*100;
    if(Math.abs(ic)>=15) o.push({tone:ic>0?'good':'warn',text:`Income ${ic>0?'rose':'fell'} ${pct(Math.abs(ic))} versus the previous period.`});
  }
  if(a.net<0) o.push({tone:'warn',text:`You spent ${money(Math.abs(a.net))} more than you earned this period (negative cash flow).`});
  if(sr>=20) o.push({tone:'good',text:`Savings rate was ${pct(sr)} — at or above a common 20% target.`});
  else if(a.income>0 && sr<psr-5) o.push({tone:'warn',text:`Savings rate slipped from ${pct(psr)} to ${pct(sr)}.`});
  over.slice(0,4).forEach(ov=>o.push({tone:'warn',text:`${ov.cat} exceeded its budget by ${money(ov.diff)} (${money(ov.actual)} of ${money(ov.planned)}).`}));

  // subscription price increase detection
  const subInc=detectSubscriptionIncrease(mk);
  subInc.slice(0,3).forEach(s=>o.push({tone:'warn',text:`${s.merchant} appears to have increased: ${money(s.prev)} → ${money(s.now)}.`}));

  // utilization above threshold
  const thr=Number(S.settings.utilThreshold)||30;
  S.debts.forEach(dbt=>{ const lim=Number(dbt.creditLimit)||0; const bal=Number(dbt.currentBalance)||0; if(lim>0){ const u=bal/lim*100; if(u>thr) o.push({tone:'warn',text:`${dbt.name} utilization is ${pct(u)}, above your ${thr}% threshold.`}); } });

  // no investment contribution

let _pendingRule=null;
function suggestKeyword(desc){
  let s=(desc||'').toUpperCase().trim();
  if(!s) return '';
  const BRANDS=['VENMO','PAYPAL','ZELLE','CASHAPP','CASH APP','APPLE PAY','GOOGLE PAY','AFTERPAY','KLARNA','AFFIRM'];
  for(const b of BRANDS){ if(s.indexOf(b)>=0) return b==='CASH APP'?'CASHAPP':b; }
  // payment-processor prefix e.g. "TST*MERCHANT", "SQ *MERCHANT"
  let pm=s.match(/^(?:SQ|TST|PP|SP|CKE)\s*\*+\s*([A-Z0-9&'.-]+(?: [A-Z0-9&'.-]+)?)/);
  if(pm) s=pm[1];
  // a store-number marker (#) ends the merchant name — cut there
  const hash=s.search(/#/);
  if(hash>0) s=s.slice(0,hash);
  s=s.replace(/[^A-Z0-9 *.&'-]/g,' ').replace(/\s+/g,' ').trim();
  const STATES=new Set('AL AK AZ AR CA CO CT DE FL GA HI ID IL IN IA KS KY LA ME MD MA MI MN MS MO MT NE NV NH NJ NM NY NC ND OH OK OR PA RI SC SD TN TX UT VT VA WA WV WI WY DC'.split(' '));
  const NOISE=new Set(['POS','WEB','US','USA','PENDING','PURCHASE','DEBIT','CREDIT','CARD','BILL','PAY','PAYMENT','PMT','PMTS','CCPYMT','CKCD','ACH','RECUR','RECURRING','ONLINE','AUTOPAY','AUTOPYMT','AUTH','TRANSACTION','TRANS','REF','LLC','INC','CORP','STORE','RETAIL','THE','WWW','COM']);
  const isNum=t=>/^#?\d+$/.test(t);
  const toks=s.split(' ').filter(Boolean);
  // Build the CONSECUTIVE leading run of merchant words. Stop at the first
  // token that begins the codes/location tail so the result is always a real
  // substring of the description (and therefore actually matches).
  const name=[];
  for(let i=0;i<toks.length;i++){
    const t=toks[i], next=toks[i+1]||'';
    if(NOISE.has(t) || STATES.has(t) || isNum(t)) break;   // POS / country / state / store number
    if(t.length===1 && NOISE.has(next)) break;             // stray single-letter code, e.g. "MCDONALD'S F POS"
    if(STATES.has(next) && name.length>=1) break;          // this word is the city, the next is the state
    name.push(t);
    if(name.length>=3) break;
  }
  let kept=name.length?name:toks.filter(t=>!isNum(t)).slice(0,2);
  return kept.join(' ').slice(0,24);
}

function toggleRule(id){ const r=S.rules.find(x=>x.id===id); r.enabled=r.enabled===false; save(); }
function moveRule(id,dir){
  const sorted=[...S.rules].sort((a,b)=>(a.order??0)-(b.order??0));
  const i=sorted.findIndex(r=>r.id===id); if(i<0) return;
  const j=i+dir; if(j<0||j>=sorted.length) return;
  const PER=15;
  const crossing = Math.floor(i/PER)!==Math.floor(j/PER);
  const reduce = (typeof window!=='undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  // FLIP — First: remember each rule row's current top (same-page moves only)
  const first={};
  if(!reduce && !crossing){ document.querySelectorAll('tr[data-rule-id]').forEach(tr=>{ first[tr.getAttribute('data-rule-id')]=tr.getBoundingClientRect().top; }); }
  // mutate order, follow the rule to its page, re-render
  [sorted[i],sorted[j]]=[sorted[j],sorted[i]];
  sorted.forEach((r,k)=>r.order=k);
  rulePage=Math.floor(j/PER)+1;
  save(); render();
  if(reduce||crossing){ flashMovedRow(id); return; }
  // FLIP — Last/Invert: offset rows back to where they were
  const rows=[...document.querySelectorAll('tr[data-rule-id]')];
  let any=false;
  rows.forEach(tr=>{
    const rid=tr.getAttribute('data-rule-id');
    if(first[rid]==null) return;
    const delta=first[rid]-tr.getBoundingClientRect().top;
    if(!delta) return;
    any=true;
    tr.style.transition='none';
    tr.style.transform='translateY('+delta+'px)';
    if(rid===id){ tr.style.position='relative'; tr.style.zIndex='2'; }
  });
  if(!any){ flashMovedRow(id); return; }
  // force reflow, then Play: transition transforms back to 0
  void document.documentElement.offsetHeight;
  requestAnimationFrame(()=>{
    rows.forEach(tr=>{ tr.style.transition='transform 300ms cubic-bezier(.22,.68,.28,1)'; tr.style.transform='translateY(0)'; });
  });
  setTimeout(()=>{
    rows.forEach(tr=>{ tr.style.transition=''; tr.style.transform=''; tr.style.position=''; tr.style.zIndex=''; });
    flashMovedRow(id);
  }, 340);
}

/* ---------- Orphaned-category reconciliation ----------
   An "orphan" is a transaction or rule pointing at a category/subcategory that
   no longer exists (renamed or deleted). Nothing is ever reassigned silently:
   the user picks a destination (bulk move) or clears & flags for review. */
let _reconRows=[]; let _orphanScan=[];
function orphanMatchTx(o,t){
  if(o.subcategory!=null){
    if((t.subcategory||'')!==o.subcategory) return false;
    if(o.category!=null && (t.category||'')!==o.category) return false;
    return true;
  }
  return o.category!=null && (t.category||'')===o.category;
}
function applyOrphanChoice(o,v){
  let moved=0, cleared=0, rules=0;
  if(v==='__clear__'){
    // Back to Uncategorized only — the uncategorized queue IS the review path
    // for these, so no separate review badge (that would be a double queue).
    S.transactions.forEach(t=>{ if(orphanMatchTx(o,t)){ t.subcategory=''; t.category=''; t.transfer=false; t.manualCat=false; t.needsReview=false; cleared++; } });
    if(o.subcategory!=null) S.rules.forEach(r=>{ if(r.subcategory===o.subcategory && r.enabled!==false){ r.enabled=false; rules++; } });
  } else {
    const cat=categoryForSub(v)||'';
    S.transactions.forEach(t=>{ if(orphanMatchTx(o,t)){ t.subcategory=v; t.category=cat; t.transfer=isTransferCat(cat); t.manualCat=true; t.needsReview=false; moved++; } });
    if(o.subcategory!=null) S.rules.forEach(r=>{ if(r.subcategory===o.subcategory){ r.subcategory=v; r.category=cat; if(isTransferCat(cat)) r.transfer=true; rules++; } });
  }
  return {moved,cleared,rules};
}
function openReconcile(rows, heading){
  _reconRows=rows;
  const body=rows.map((o,i)=>`
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <div style="min-width:200px"><b>${esc(o.subcategory!=null?o.subcategory:(o.category+' (category)'))}</b>
        <div class="mini">${o.tx} transaction${o.tx!==1?'s':''}${o.rules?` · ${o.rules} rule${o.rules!==1?'s':''}`:''}</div></div>
      <select id="reconSel${i}" style="flex:1;min-width:220px">
        <option value="">— leave for now (shows in Data quality) —</option>
        <option value="__clear__">Clear — send back to Uncategorized</option>
        ${subOptgroups('')}
      </select>
    </div>`).join('');
  openModal(`<div class="mhd"><h3>Where should these go?</h3><button class="x" onclick="closeModal()">×</button></div>
  <div class="mbd">
    <p class="mini" style="margin:0 0 12px">${esc(heading)}. Pick a destination to move a whole batch in one step, or clear them back to Uncategorized and re-file them from the uncategorized list. Rules that point at these names get the same treatment, so orphans can't come back on the next import.</p>
    ${body}
  </div>
  <div class="mft"><button class="btn" onclick="closeModal()">Later</button><button class="btn primary" onclick="applyReconcile()">Apply</button></div>`);
}
function applyReconcile(){
  let moved=0, cleared=0, rules=0;
  _reconRows.forEach((o,i)=>{
    const el=document.getElementById('reconSel'+i); const v=el?el.value:'';
    if(!v) return;
    const r=applyOrphanChoice(o,v); moved+=r.moved; cleared+=r.cleared; rules+=r.rules;
  });
  save(); closeModal(); render();
  const bits=[]; if(moved)bits.push(moved+' moved'); if(cleared)bits.push(cleared+' sent to Uncategorized'); if(rules)bits.push(rules+' rule'+(rules!==1?'s':'')+' updated');
  toast(bits.length?bits.join(' · '):'Nothing changed');
}
function orphanGroups(){
  const subsKnown=new Set(); S.categories.forEach(c=>(c.subs||[]).forEach(s=>subsKnown.add(s)));
  const catsKnown=new Set(S.categories.map(c=>c.name)); catsKnown.add('Uncategorized');
  const rows=[]; const byKey={};
  const rowFor=(cat,sub)=>{ const k=String(cat)+'|'+String(sub); if(!byKey[k]){ byKey[k]={category:cat,subcategory:sub,tx:0,rules:0}; rows.push(byKey[k]); } return byKey[k]; };
  S.transactions.forEach(t=>{
    if(t.subcategory && !subsKnown.has(t.subcategory)) rowFor((t.category||''), t.subcategory).tx++;
    else if(t.category && t.category!=='Uncategorized' && !catsKnown.has(t.category)) rowFor(t.category, null).tx++;
  });
  S.rules.forEach(r=>{
    if(r.enabled!==false && r.subcategory && !subsKnown.has(r.subcategory)){
      const existing=rows.find(x=>x.subcategory===r.subcategory);
      (existing || rowFor((r.category||''), r.subcategory)).rules++;
    }
  });
  rows.sort((a,b)=>(b.tx-a.tx)||(b.rules-a.rules));
  return rows;
}
function qFixOrphan(i){
  const o=_orphanScan[i]; if(!o) return;
  const el=document.getElementById('orphSel'+i); const v=el?el.value:'';
  if(!v){ toast('Choose a destination for that row first','warn'); return; }
  const r=applyOrphanChoice(o,v);
  save(); render();
  const bits=[]; if(r.moved)bits.push(r.moved+' moved'); if(r.cleared)bits.push(r.cleared+' sent to Uncategorized'); if(r.rules)bits.push(r.rules+' rule'+(r.rules!==1?'s':'')+' updated');
  toast(bits.join(' · ')||'Nothing changed');
}
function delCategory(name){
  const cat=S.categories.find(c=>c.name===name); if(!cat) return;
  confirmBox('Delete category',`Delete “${name}”? Next you'll choose where its transactions go — nothing is reassigned without you.`,()=>{
    S.categories=S.categories.filter(c=>c.name!==name);
    const subs=(cat.subs||[]);
    const orphans=subs.map(s=>({category:null, subcategory:s,
      tx:S.transactions.filter(t=>t.subcategory===s).length,
      rules:S.rules.filter(r=>r.subcategory===s).length})).filter(o=>o.tx||o.rules);
    const catOnly=S.transactions.filter(t=>t.category===name && !subs.includes(t.subcategory||'')).length;
    if(catOnly) orphans.push({category:name, subcategory:null, tx:catOnly, rules:0});
    save(); closeModal(); render();
    if(orphans.length) openReconcile(orphans, `“${name}” was deleted`);
    else toast('Category deleted');
  },'Delete',true);
}

function scanQuality(){
  const groups=[];
  const acctIds=new Set(S.accounts.map(a=>a.id));

  // orphaned categories: transactions/rules pointing at names that no longer exist
  _orphanScan=orphanGroups();
  groups.push({title:'Orphaned categories',icon:'⌦',tone:'warn',
    help:'These point at a category or subcategory that no longer exists (renamed or deleted). Pick a destination to move a batch in one step, or clear them back to Uncategorized to re-file from the uncategorized list. Matching rules get the same treatment so orphans can\u2019t come back on the next import.',
    items:_orphanScan.map((o,i)=>({
      label:`<b>${esc(o.category||'—')}${o.subcategory!=null?' › '+esc(o.subcategory):' (category)'}</b> <span class="mini">· ${o.tx} transaction${o.tx!==1?'s':''}${o.rules?` · ${o.rules} rule${o.rules!==1?'s':''}`:''}</span>`,
      action:`<select id="orphSel${i}" style="max-width:230px"><option value="">— destination —</option><option value="__clear__">Clear — send back to Uncategorized</option>${subOptgroups('')}</select> <button class="btn sm" onclick="qFixOrphan(${i})">Apply</button>`
    }))});

  // duplicates by fingerprint
  const seen={}, dups=[];
  S.transactions.forEach(t=>{ const balPart=(t.bankBalance!=null&&t.bankBalance!=='')?'|'+Number(t.bankBalance).toFixed(2):''; const fp=`${t.accountId}|${t.date}|${(t.description||'').slice(0,20).toLowerCase()}|${Math.abs(t.amount).toFixed(2)}${balPart}`; if(seen[fp]) dups.push({a:seen[fp],b:t}); else seen[fp]=t; });
  const _ddup=new Set((S.settings.dismissedDupes)||[]);
  const dupsV=dups.filter(d=>!_ddup.has(d.b.id));
  groups.push({title:'Possible duplicates',icon:'⧉',tone:'warn',help:'Same account, date, description, and amount appear more than once. Dismiss the ones that are genuine repeat purchases.',
    items:dupsV.map(d=>({label:`${fmtDate(d.b.date)} · ${esc(d.b.merchant||d.b.description)} · ${money(Math.abs(d.b.amount))}`,action:`<button class="btn sm" onclick="qDismissDupe('${d.b.id}')">Not a dup</button> <button class="btn sm danger" onclick="qDelete('${d.b.id}')">Delete dup</button>`}))});

  // uncategorized
  const uncats=S.transactions.filter(t=>!t.category||t.category==='Uncategorized');
  groups.push({title:'Uncategorized transactions',icon:'⚑',tone:'warn',help:'These are excluded from category budgets until filed.',
    bulk:uncats.length?`go('rules')`:'',bulkLabel:'Review now',
    items:uncats.map(t=>({label:`${fmtDate(t.date)} · ${esc(t.merchant||t.description)} · ${money(Math.abs(t.amount))}`,action:`<button class="btn sm" onclick="go('rules')">Categorize</button>`}))});

  // missing account
  const noAcct=S.transactions.filter(t=>!t.accountId||!acctIds.has(t.accountId));
  groups.push({title:'Missing account assignment',icon:'▣',tone:'red',help:'Transactions not linked to a valid account distort balances.',
    items:noAcct.map(t=>({label:`${fmtDate(t.date)} · ${esc(t.merchant||t.description)}`,action:`<button class="btn sm" onclick="editTx('${t.id}')">Fix</button>`}))});

  // invalid dates
  const badDate=S.transactions.filter(t=>!t.date||isNaN(new Date(t.date).getTime()));
  groups.push({title:'Invalid dates',icon:'📅',tone:'red',help:'Dates that could not be parsed.',
    items:badDate.map(t=>({label:`${esc(t.merchant||t.description)} · ${esc(String(t.date))}`,action:`<button class="btn sm" onclick="editTx('${t.id}')">Fix</button>`}))});

  // missing amounts
  const badAmt=S.transactions.filter(t=>t.amount==null||isNaN(t.amount)||Number(t.amount)===0);
  groups.push({title:'Missing or zero amounts',icon:'＄',tone:'warn',help:'Transactions with no usable amount.',
    items:badAmt.map(t=>({label:`${fmtDate(t.date)} · ${esc(t.merchant||t.description)}`,action:`<button class="btn sm" onclick="editTx('${t.id}')">Fix</button>`}))});

  // possible transfers
  const posTransfers=S.transactions.filter(t=>!t.transfer && t.category!=='Transfers' && (looksLikeTransfer(t.description||'')||looksLikeCardPayment(t.description||'')));
  groups.push({title:'Possible transfers',icon:'⇄',tone:'note',help:'Look like moves between your own accounts or card payments. Confirm to keep them out of spending.',
    items:posTransfers.map(t=>({label:`${fmtDate(t.date)} · ${esc(t.merchant||t.description)} · ${money(Math.abs(t.amount))}`,action:`<button class="btn sm" onclick="qMarkTransfer('${t.id}')">Mark transfer</button>`}))});

  // possible recurring
  const _drec=new Set((S.settings.dismissedRecurring)||[]);
  const recurCandidates=detectRecurringCandidates().filter(r=>!_drec.has(r.key));
  groups.push({title:'Possible recurring charges',icon:'↻',tone:'note',help:'The same merchant appears in 3+ months at a similar amount.',
    items:recurCandidates.map(r=>({label:`${esc(r.merchant)} · ~${money(r.amt)} · ${r.months} months`,action:`<button class="btn sm" onclick="qMarkRecurring('${esc(r.key)}')">Mark recurring</button> <button class="btn sm" onclick="qDismissRecurring('${esc(r.key)}')">Dismiss</button>`}))});

  // stale account balances
  const now=Date.now();
  const stale=S.accounts.filter(a=>a.active!==false && (!a.lastUpdated || (now-new Date(a.lastUpdated).getTime())>45*864e5));
  groups.push({title:'Stale account balances',icon:'⏳',tone:'note',help:'No update or import in 45+ days. Reconcile to confirm the balance.',
    items:stale.map(a=>({label:`${esc(a.name)} · last updated ${a.lastUpdated?fmtDate(a.lastUpdated):'never'}`,action:`<button class="btn sm" onclick="go('accounts')">Reconcile</button>`}))});

  // stale investment prices
  const staleInv=[];
  S.investments.forEach(inv=>(inv.holdings||[]).forEach(h=>{ if(!h.lastValuation || (now-new Date(h.lastValuation).getTime())>45*864e5) staleInv.push({inv,h}); }));
  groups.push({title:'Stale investment prices',icon:'↗',tone:'note',help:'Holdings not revalued in 45+ days. Update prices for accurate value.',
    items:staleInv.map(x=>({label:`${esc(x.inv.name)} · ${esc(x.h.ticker||x.h.name)} · ${x.h.lastValuation?fmtDate(x.h.lastValuation):'never'}`,action:`<button class="btn sm" onclick="go('investments')">Update</button>`}))});

  // debt balances not reconciling with payment history
  const debtMismatch=[];
  S.debts.forEach(d=>{ if(!d.payments||!d.payments.length||!d.originalPrincipal) return;
    const paidPrincipal=d.payments.reduce((s,p)=>s+(Number(p.principal)||0)-(Number(p.newCharges)||0),0);
    const expected=Number(d.originalPrincipal)-paidPrincipal;
    if(Math.abs(expected-Number(d.currentBalance))>Math.max(25,Number(d.originalPrincipal)*0.02)) debtMismatch.push({d,expected});
  });
  groups.push({title:'Debt balances that don’t reconcile',icon:'◔',tone:'warn',help:'Current balance differs from original principal minus recorded principal payments.',
    items:debtMismatch.map(x=>({label:`${esc(x.d.name)} · recorded ${money(x.d.currentBalance)} · expected ~${money(x.expected)}`,action:`<button class="btn sm" onclick="go('debt')">Review</button>`}))});

  return groups;
}

function detectRecurringCandidates(){
  const map={};
  S.transactions.filter(t=>!t.recurring && txFlow(t).spending>0).forEach(t=>{ const key=(t.merchant||t.description||'').toLowerCase().slice(0,24); if(!key) return; (map[key]=map[key]||[]).push(t); });
  const out=[];
  Object.keys(map).forEach(key=>{ const arr=map[key]; const months=new Set(arr.map(t=>t.date.slice(0,7))); if(months.size>=3){ const amt=arr.reduce((s,t)=>s+Math.abs(t.amount),0)/arr.length; out.push({key,merchant:arr[0].merchant||arr[0].description,amt,months:months.size}); } });
  return out.sort((a,b)=>b.months-a.months).slice(0,20);
}

/* ---- Snapshot generation ---- */
function snapshotRange(){
  if(exportOpts.scope==='month'){ const mk=reviewMonthKey(); return {start:mk+'-01',end:mk+'-31',label:monthLabel(mk),mk}; }
  if(exportOpts.scope==='ytd'){ const y=new Date().getFullYear(); return {start:y+'-01-01',end:toISODate(new Date()),label:y+' year to date'}; }
  if(exportOpts.scope==='range'){ const r=activeRange(); return {start:r.start,end:r.end,label:rangeLabel()}; }
  return {start:'0000-01-01',end:'9999-12-31',label:'All history'};
}
function snapshotTx(r){
  const ids=exportOpts.acct==='all'? new Set(S.accounts.map(a=>a.id)) : new Set([exportOpts.acct]);
  return S.transactions.filter(t=>t.date>=r.start && t.date<=r.end && ids.has(t.accountId));
}

function buildSnapshot(){
  const r=snapshotRange();
  const txs=snapshotTx(r);
  const a=analyze(txs);
  const cur=S.settings.currency||'USD';
  const L=[]; const m=n=>money(n);
  const cell=s=>String(s==null?'':s).replace(/\|/g,'\\|').replace(/\n/g,' ');
  const pctOf=(v,tot)=> tot>0? pct(v/tot*100) : '—';
  const today=fmtDate(new Date());
  const mk=r.mk||reviewMonthKey();
  const bud=budgetForMonth(mk);

  const assetsTotal=totalCash()+totalInvest()+S.manualAssets.filter(x=>x.kind!=='liability').reduce((s,x)=>s+Number(x.value||0),0);
  const liabTotal=totalDebt()+S.manualAssets.filter(x=>x.kind==='liability').reduce((s,x)=>s+Number(x.value||0),0);
  const nw=netWorth().net;
  const sr=savingsRate(a.income,a.spending);
  let invVal=0,invContrib=0; S.investments.forEach(inv=>{ invVal+=invValue(inv); (inv.holdings||[]).forEach(h=>invContrib+=Number(h.contributions)||holdingCost(h)); });

  // Cover
  L.push(`# Personal Financial Report`);
  L.push(``);
  L.push(`**Reporting period:** ${r.label}`);
  L.push(`**Prepared:** ${today}`);
  L.push(`**Currency:** ${cur}`);
  L.push(`**Accounts included:** ${exportOpts.acct==='all'?'All accounts':cell(accountName(exportOpts.acct))}`);
  L.push(``);
  L.push(`*Prepared from a personal finance dashboard. All figures are user-entered estimates, not statements from a financial institution. No account numbers are included. This document is confidential.*`);
  L.push(``);
  L.push(`---`);
  L.push(``);

  // Contents
  L.push(`## Contents`);
  L.push(``);
  L.push(`1. Executive Summary`);
  L.push(`2. Profile & Reporting Parameters`);
  L.push(`3. Net Worth Statement`);
  L.push(`4. Income & Cash Flow`);
  L.push(`5. Spending by Category`);
  L.push(`6. Budget Performance`);
  L.push(`7. Debt Profile`);
  L.push(`8. Investment Portfolio`);
  L.push(`9. Recurring Obligations`);
  L.push(`10. Observations & Flags`);
  if(exportOpts.detail==='detailed' && exportOpts.includeTx) L.push(`- Appendix A: Detailed Transactions`);
  L.push(``);
  L.push(`---`);
  L.push(``);

  // 1. Executive Summary
  L.push(`## 1. Executive Summary`);
  L.push(``);
  L.push(`As of ${today}, net worth stands at **${m(nw)}**, comprising ${m(assetsTotal)} in assets against ${m(liabTotal)} in liabilities. Over the reporting period, total income was ${m(a.income)} against ${m(a.spending)} in spending, producing ${a.net>=0?'a net surplus':'a net deficit'} of **${m(Math.abs(a.net))}** and a savings rate of ${pct(sr)}. The emergency fund currently covers ${emergencyMonths().toFixed(1)} month(s) of essential expenses.`);
  L.push(``);
  L.push(`| Metric | Value |`);
  L.push(`| --- | --- |`);
  L.push(`| Net worth | ${m(nw)} |`);
  L.push(`| Total assets | ${m(assetsTotal)} |`);
  L.push(`| Total liabilities | ${m(liabTotal)} |`);
  L.push(`| Income (period) | ${m(a.income)} |`);
  L.push(`| Spending (period) | ${m(a.spending)} |`);
  L.push(`| Net cash flow (period) | ${m(a.net)} |`);
  L.push(`| Savings rate | ${pct(sr)} |`);
  L.push(`| Total debt | ${m(totalDebt())} |`);
  L.push(`| Minimum debt payments | ${m(minPaymentsDue())} / mo |`);
  L.push(`| Investment value | ${m(invVal)} |`);
  L.push(`| Emergency fund coverage | ${emergencyMonths().toFixed(1)} months |`);
  L.push(``);

  // 2. Profile
  L.push(`## 2. Profile & Reporting Parameters`);
  L.push(``);
  L.push(`| Parameter | Detail |`);
  L.push(`| --- | --- |`);
  L.push(`| Reporting period | ${cell(r.label)} |`);
  L.push(`| Accounts included | ${exportOpts.acct==='all'?'All accounts':cell(accountName(exportOpts.acct))} |`);
  L.push(`| Transactions analyzed | ${txs.length} |`);
  L.push(`| Income sources | ${cell((S.settings.incomeSources||[]).join(', ')||'Not specified')} |`);
  L.push(`| Stated goals | ${cell((S.settings.goals||[]).join(', ')||'Not specified')} |`);
  L.push(`| Essential monthly spending (est.) | ${m(essentialMonthly())} |`);
  L.push(``);

  // 3. Net Worth Statement
  L.push(`## 3. Net Worth Statement`);
  L.push(``);
  L.push(`| Item | Type | Value |`);
  L.push(`| --- | --- | --- |`);
  S.accounts.filter(x=>x.active!==false).forEach(x=>{
    const isLiab=['credit','loan'].includes(x.type);
    L.push(`| ${cell(x.name)} | ${isLiab?'Liability':'Asset'} (${x.type})${x.includeInNetWorth===false?', excluded':''} | ${m(accountBalance(x))} |`);
  });
  S.manualAssets.forEach(x=>L.push(`| ${cell(x.name)} | Manual ${x.kind==='liability'?'liability':'asset'} | ${m((x.kind==='liability'?-1:1)*Number(x.value||0))} |`));
  L.push(`| **Total assets** |  | **${m(assetsTotal)}** |`);
  L.push(`| **Total liabilities** |  | **${m(liabTotal)}** |`);
  L.push(`| **Net worth** |  | **${m(nw)}** |`);
  L.push(``);

  // 4. Income & Cash Flow
  L.push(`## 4. Income & Cash Flow`);
  L.push(``);
  L.push(`| Measure | Amount |`);
  L.push(`| --- | --- |`);
  L.push(`| Total income | ${m(a.income)} |`);
  L.push(`| Total spending | ${m(a.spending)} |`);
  L.push(`| Net cash flow | ${m(a.net)} |`);
  L.push(`| Savings rate | ${pct(sr)} |`);
  L.push(``);
  const nwTot=a.needsWants.need+a.needsWants.want+a.needsWants.savings+a.needsWants.debt;
  L.push(`Spending classified against the 50/30/20 framework:`);
  L.push(``);
  L.push(`| Classification | Amount | Share |`);
  L.push(`| --- | --- | --- |`);
  L.push(`| Needs | ${m(a.needsWants.need)} | ${pctOf(a.needsWants.need,nwTot)} |`);
  L.push(`| Wants | ${m(a.needsWants.want)} | ${pctOf(a.needsWants.want,nwTot)} |`);
  L.push(`| Savings | ${m(a.needsWants.savings)} | ${pctOf(a.needsWants.savings,nwTot)} |`);
  L.push(`| Debt payoff | ${m(a.needsWants.debt)} | ${pctOf(a.needsWants.debt,nwTot)} |`);
  L.push(``);

  // 5. Spending by Category
  L.push(`## 5. Spending by Category`);
  L.push(``);
  const cats=Object.entries(a.byCat).sort((x,y)=>y[1]-x[1]);
  if(cats.length){
    L.push(`| Category | Amount | Share of spending |`);
    L.push(`| --- | --- | --- |`);
    cats.forEach(([c,v])=>L.push(`| ${cell(c)} | ${m(v)} | ${pctOf(v,a.spending)} |`));
  } else L.push(`No categorized spending in the period.`);
  L.push(``);
  const subRows=Object.entries(a.bySub).map(([k,v])=>{ const ix=k.indexOf(' › '); return {cat: ix>=0?k.slice(0,ix):k, sub: ix>=0?k.slice(ix+3):'—', v}; });
  if(subRows.length){
    L.push(`### Detail by subcategory`);
    L.push(``);
    L.push(`| Category | Subcategory | Amount | Share of spending |`);
    L.push(`| --- | --- | --- | --- |`);
    const catTot={}; cats.forEach(([c,v])=>{ catTot[c]=v; });
    subRows.sort((x,y)=> (catTot[y.cat]||0)-(catTot[x.cat]||0) || y.v-x.v );
    subRows.forEach(e=>L.push(`| ${cell(e.cat)} | ${cell(e.sub)} | ${m(e.v)} | ${pctOf(e.v,a.spending)} |`));
    L.push(``);
  }

  // 6. Budget Performance
  L.push(`## 6. Budget Performance${Object.keys(bud).length?` — ${monthLabel(mk)}`:''}`);
  L.push(``);
  const budRows=Object.entries(bud).filter(([c,p])=>p>0);
  if(budRows.length){
    L.push(`| Category | Budget | Actual | Variance |`);
    L.push(`| --- | --- | --- | --- |`);
    budRows.forEach(([c,planned])=>{ const actual=a.byCat[c]||0; const v=planned-actual; L.push(`| ${cell(c)} | ${m(planned)} | ${m(actual)} | ${v>=0?'+':'−'}${m(Math.abs(v))} |`); });
  } else L.push(`No budgets set.`);
  L.push(``);

  // 7. Debt Profile
  L.push(`## 7. Debt Profile`);
  L.push(``);
  if(S.debts.length){
    L.push(`Total outstanding debt is ${m(totalDebt())}, requiring ${m(minPaymentsDue())} in minimum payments per month.`);
    L.push(``);
    L.push(`| Debt | Type | Balance | APR | Min. payment | Utilization | Est. payoff |`);
    L.push(`| --- | --- | --- | --- | --- | --- | --- |`);
    S.debts.forEach(d=>{
      const months=payoffMonths(Number(d.currentBalance),Number(d.apr),Number(d.minPayment));
      const util=Number(d.creditLimit)? pct(Number(d.currentBalance)/Number(d.creditLimit)*100):'—';
      L.push(`| ${cell(d.name)} | ${d.type}, ${d.rateType} | ${m(d.currentBalance)} | ${d.apr}% | ${m(d.minPayment)} | ${util} | ${payoffDateLabel(months)} |`);
    });
    const promos=S.debts.filter(d=>d.promoExpiration);
    if(promos.length){ L.push(``); promos.forEach(d=>L.push(`- Promotional rate on ${cell(d.name)} ends ${d.promoExpiration}.`)); }
  } else L.push(`No debts recorded.`);
  L.push(``);

  // 8. Investment Portfolio
  L.push(`## 8. Investment Portfolio`);
  L.push(``);
  if(S.investments.length){
    L.push(`Portfolio value is ${m(invVal)} against ${m(invContrib)} in contributions, an unrealized ${invVal-invContrib>=0?'gain':'loss'} of ${m(Math.abs(invVal-invContrib))}.`);
    L.push(``);
    L.push(`| Account | Type | Value | Contributions | Gain / Loss |`);
    L.push(`| --- | --- | --- | --- | --- |`);
    S.investments.forEach(inv=>{ const v=invValue(inv); let c=0;(inv.holdings||[]).forEach(h=>c+=Number(h.contributions)||holdingCost(h)); L.push(`| ${cell(inv.name)} | ${inv.type}${isRetirement(inv.type)?' (retirement)':''} | ${m(v)} | ${m(c)} | ${m(v-c)} |`); });
  } else L.push(`No investments recorded.`);
  L.push(``);

  // 9. Recurring Obligations
  L.push(`## 9. Recurring Obligations`);
  L.push(``);
  const recur=[...new Map(S.transactions.filter(t=>t.recurring&&txFlow(t).spending>0).map(t=>[(t.merchant||t.description||'').toLowerCase(),t])).values()];
  if(recur.length){
    L.push(`| Merchant | Category | Approx. amount |`);
    L.push(`| --- | --- | --- |`);
    recur.forEach(t=>L.push(`| ${exportOpts.includeMerchants?cell(t.merchant||t.description):'(hidden)'} | ${cell(t.category||'Uncategorized')} | ${m(Math.abs(t.amount))} |`));
  } else L.push(`No recurring transactions flagged.`);
  L.push(``);

  // 10. Observations & Flags
  L.push(`## 10. Observations & Flags`);
  L.push(``);
  const flags=snapshotFlags(a,mk);
  if(flags.length) flags.forEach(f=>L.push(`- ${f}`)); else L.push(`No flags raised — cash-flow, emergency-fund, utilization, and categorization checks all passed.`);
  L.push(``);

  // Appendix
  if(exportOpts.detail==='detailed' && exportOpts.includeTx){
    L.push(`---`);
    L.push(``);
    L.push(`## Appendix A. Detailed Transactions`);
    L.push(``);
    L.push(`| Date | Merchant | Category | Subcategory | Amount | Type |`);
    L.push(`| --- | --- | --- | --- | --- | --- |`);
    txs.slice().sort((x,y)=>y.date.localeCompare(x.date)).forEach(t=>{
      const merch=exportOpts.includeMerchants?cell(t.merchant||t.description||'—'):'(hidden)';
      const note=exportOpts.includeNotes&&t.notes?` — ${cell(t.notes)}`:'';
      L.push(`| ${t.date} | ${merch}${note} | ${cell(t.category||'Uncategorized')} | ${cell(t.subcategory||'—')} | ${m(Math.abs(t.amount))} | ${t.transfer?'Transfer':(t.kind==='income'?'Income':'Expense')} |`);
    });
    L.push(``);
  }

  // Methodology
  L.push(`---`);
  L.push(``);
  L.push(`### Methodology & Disclaimers`);
  L.push(``);
  L.push(`- Transfers and credit-card payments are excluded from income and spending to avoid double-counting; they are reflected only in account balances.`);
  L.push(`- Investment contributions are tracked separately from market gains.`);
  L.push(`- Needs, wants, savings, and debt are classified at the subcategory level.`);
  L.push(`- Net worth = included assets − included liabilities. Savings rate = (income − spending) ÷ income.`);
  L.push(`- All balances and valuations are user-entered estimates and may differ from official statements. Verify against source statements before making financial decisions. This report is informational and is not financial advice.`);
  return L.join('\n');
}

function snapshotFlags(a,mk){
  const f=[];
  if(a.net<0) f.push(`Negative cash flow in period (${money(a.net)}).`);
  if(emergencyMonths()<3) f.push(`Emergency fund below 3 months (${emergencyMonths().toFixed(1)} months).`);
  const thr=Number(S.settings.utilThreshold)||30;
  S.debts.forEach(d=>{ const lim=Number(d.creditLimit)||0; if(lim>0 && Number(d.currentBalance)/lim*100>thr) f.push(`${d.name} credit utilization above ${thr}%.`); });
  S.debts.forEach(d=>{ if(d.promoExpiration){ const days=(new Date(d.promoExpiration)-new Date())/864e5; if(days>0&&days<90) f.push(`${d.name} promotional rate ends in ${Math.round(days)} days (${d.promoExpiration}).`); } });
  const hi=S.debts.filter(d=>Number(d.apr)>=20); if(hi.length) f.push(`High-interest debt present (APR ≥ 20%): ${hi.map(d=>d.name).join(', ')}.`);
  if(S.transactions.some(t=>!t.category||t.category==='Uncategorized')) f.push(`Some transactions are uncategorized; spending totals may be incomplete.`);
  return f;
}

/* ---- Formal report rendering ---- */
function mdToHtml(md){
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline=s=>esc(s).replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*\n]+?)\*/g,'<em>$1</em>');
  const lines=String(md).split('\n');
  const out=[]; let i=0;
  const isSep=l=>l.indexOf('|')>=0 && /^[\s|:\-]*-{3,}[\s|:\-]*$/.test(l);
  const cells=l=>l.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
  while(i<lines.length){
    const l=lines[i];
    if(/^\s*$/.test(l)){ i++; continue; }
    if(l.indexOf('|')>=0 && i+1<lines.length && isSep(lines[i+1])){
      const head=cells(l); i+=2; const rows=[];
      while(i<lines.length && lines[i].indexOf('|')>=0 && !/^\s*$/.test(lines[i])){ rows.push(cells(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(h=>'<th>'+inline(h)+'</th>').join('')+'</tr></thead><tbody>';
      rows.forEach(r=>{ t+='<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>'; });
      out.push(t+'</tbody></table>'); continue;
    }
    if(/^###\s+/.test(l)){ out.push('<h3>'+inline(l.replace(/^###\s+/,''))+'</h3>'); i++; continue; }
    if(/^##\s+/.test(l)){ out.push('<h2>'+inline(l.replace(/^##\s+/,''))+'</h2>'); i++; continue; }
    if(/^#\s+/.test(l)){ out.push('<h1>'+inline(l.replace(/^#\s+/,''))+'</h1>'); i++; continue; }
    if(/^\s*---\s*$/.test(l)){ out.push('<hr>'); i++; continue; }
    if(/^\s*([-*]|\d+\.)\s+/.test(l)){
      const ordered=/^\s*\d+\.\s+/.test(l); const items=[];
      while(i<lines.length && /^\s*([-*]|\d+\.)\s+/.test(lines[i])){ items.push(lines[i].replace(/^\s*([-*]|\d+\.)\s+/,'')); i++; }
      out.push('<'+(ordered?'ol':'ul')+'>'+items.map(it=>'<li>'+inline(it)+'</li>').join('')+'</'+(ordered?'ol':'ul')+'>');
      continue;
    }
    const para=[l]; i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,3}\s|\s*---\s*$|\s*([-*]|\d+\.)\s)/.test(lines[i]) && !(lines[i].indexOf('|')>=0 && i+1<lines.length && isSep(lines[i+1]))){ para.push(lines[i]); i++; }
    out.push('<p>'+inline(para.join(' '))+'</p>');
  }
  return out.join('\n');
}

function csvEscape(v){ const s=String(v??''); return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s; }
function exportCSV(kind){
  let rows=[];
  if(kind==='transactions'){ rows.push(['date','account','merchant','description','category','subcategory','amount','signed','type','transfer','recurring','notes','tags']);
    S.transactions.forEach(t=>rows.push([t.date,accountName(t.accountId),t.merchant||'',t.description||'',t.category||'',t.subcategory||'',Math.abs(t.amount),signedAmount(t),t.kind||'',t.transfer?'yes':'',t.recurring?'yes':'',t.notes||'',(t.tags||[]).join('|')])); }
  else if(kind==='debts'){ rows.push(['name','lender','type','balance','apr','rateType','minPayment','dueDay','creditLimit','promoRate','promoExpiration']);
    S.debts.forEach(d=>rows.push([d.name,d.lender||'',d.type,d.currentBalance,d.apr,d.rateType,d.minPayment,d.dueDay,d.creditLimit||'',d.promoRate||'',d.promoExpiration||''])); }
  else if(kind==='investments'){ rows.push(['account','type','holding','ticker','quantity','avgPrice','currentPrice','value','contributions']);
    S.investments.forEach(inv=>(inv.holdings||[]).forEach(h=>rows.push([inv.name,inv.type,h.name||'',h.ticker||'',h.quantity||'',h.avgPrice||'',h.currentPrice||'',holdingValue(h),h.contributions||'']))); }
  else if(kind==='budgets'){ rows.push(['category','monthly_budget']); const b=S.budgets.recurring||{}; Object.entries(b).forEach(([c,v])=>rows.push([c,v])); }
  if(rows.length<=1){ toast('Nothing to export','warn'); return; }
  const csv=rows.map(r=>r.map(csvEscape).join(',')).join('\n');
  downloadFile(csv, `${kind}-${toISODate(new Date())}.csv`, 'text/csv');
}

/* ---- Backup / restore ---- */
function downloadBackup(){ downloadFile(JSON.stringify(S,null,2), `black-ink-backup-${toISODate(new Date())}.json`, 'application/json'); }
function restoreBackup(ev){
  const file=ev.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const data=JSON.parse(rd.result);
      if(!data||!Array.isArray(data.accounts)) throw new Error('Not a valid backup');
      confirmBox('Restore backup','This replaces ALL current data with the backup file. Continue?',()=>{ S=data; migrate(S); save(); toast('Backup restored'); render(); },'Restore',true);
    }catch(e){ toast('Could not read backup: '+e.message,'warn'); } };
  rd.readAsText(file); ev.target.value='';
}
function downloadFile(content,name,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000); toast('Download started');
}

function wizAddInvest(){ const g=x=>document.getElementById(x); const name=g('wvName').value.trim(); if(!name){ toast('Enter a name','warn'); return; } wiz.investments.push({name,type:g('wvType').value,value:parseFloat(g('wvVal').value)||0}); renderWizard(); }

function wizSkip(){ loadSampleData(); S.setupDone=true; save(); wiz=null; activeTab='overview'; toast('Loaded sample data — explore freely'); render(); }

function wizFinish(){
  captureWizStep();
  // Fresh state, keep nothing from sample
  S=newState();
  S.settings.currency=wiz.currency; S.settings.locale=wiz.locale;
  S.settings.incomeSources=wiz.income.map(i=>i.name);
  S.settings.goals=wiz.goals;
  wiz.accounts.forEach(a=>{ const isCredit=a.type==='credit'||a.type==='loan';
    S.accounts.push({id:uid('acct'),name:a.name,type:a.type,institution:a.institution||'',startingBalance:isCredit?-Math.abs(a.startingBalance):a.startingBalance,includeInNetWorth:true,active:true,lastUpdated:toISODate(new Date()),balanceHistory:[]}); });
  wiz.debts.forEach(d=>S.debts.push({id:uid('debt'),name:d.name,lender:'',type:d.type,originalPrincipal:d.currentBalance,currentBalance:d.currentBalance,apr:d.apr,rateType:'fixed',minPayment:d.minPayment,dueDay:1,creditLimit:'',promoRate:'',promoExpiration:'',startDate:'',termMonths:'',notes:'',payments:[]}));
  wiz.investments.forEach(v=>S.investments.push({id:uid('inv'),name:v.name,type:v.type,holdings:v.value>0?[{id:uid('hold'),ticker:'',name:'Total balance',quantity:1,avgPrice:v.value,costBasis:v.value,currentPrice:v.value,currentValue:v.value,contributions:v.value,dividends:0,fees:0,employerMatch:0,lastValuation:toISODate(new Date()),activity:[]}]:[]}));
  S.budgets.recurring={}; Object.keys(wiz.budget).forEach(sub=>{ S.budgets.recurring[categoryForSub(sub)+' › '+sub]=wiz.budget[sub]; });
  S.setupDone=true; S.usingSample=false;
  save(); wiz=null; activeTab='overview'; toast('Setup complete'); render();
}
/* =====================================================================
   SAMPLE DATA (taxonomy: subcategory drives category)
   ===================================================================== */
function loadSampleData(){
  S=newState();
  S.usingSample=true; S.setupDone=true;
  S.settings.incomeSources=['Primary Paycheck'];
  S.settings.goals=['Build $1,000 emergency fund','Pay off credit card','Start investing'];

  const chk={id:'acct_chk',name:'Everyday Checking',type:'checking',institution:'Sample Bank',startingBalance:1840.55,includeInNetWorth:true,active:true,lastUpdated:toISODate(new Date()),balanceHistory:[]};
  const sav={id:'acct_sav',name:'Savings',type:'savings',institution:'Sample Bank',startingBalance:620.00,includeInNetWorth:true,active:true,lastUpdated:toISODate(new Date()),balanceHistory:[]};
  const cc={id:'acct_cc',name:'Rewards Visa',type:'credit',institution:'Sample Card Co',startingBalance:-1290.30,includeInNetWorth:true,active:true,lastUpdated:toISODate(new Date()),balanceHistory:[]};
  S.accounts=[chk,sav,cc];

  const today=new Date();
  const tx=[];
  // sub = subcategory; category is derived. For transfers pass opts.transfer.
  const add=(daysAgo,acct,desc,merchant,amount,kind,sub,opts={})=>{
    const d=new Date(today); d.setDate(d.getDate()-daysAgo);
    const date=toISODate(d);
    const isInc=kind==='income';
    const transfer=opts.transfer||false;
    let category;
    if(transfer) category='Transfers';
    else if(isInc) category=categoryForSub(sub)||'Income';
    else category=categoryForSub(sub);
    tx.push({id:uid('tx'),accountId:acct,date,description:desc,originalDescription:desc,merchant,
      amount:Math.abs(amount),signed: transfer?(opts.signed??-Math.abs(amount)):(isInc?Math.abs(amount):-Math.abs(amount)),
      kind:transfer?'transfer':(isInc?'income':'expense'),txType:isInc?'CREDIT':'DEBIT',
      category,subcategory:transfer?(opts.sub||'Account transfer'):sub,flow:'',transfer,recurring:opts.recurring||false,
      notes:opts.notes||'',tags:opts.tags||[],splits:null,importSource:'sample',importDate:toISODate(today),manualCat:true,ruleApplied:null});
  };

  for(let mo=0; mo<3; mo++){
    const base=mo*30;
    // income (twice a month)
    add(base+2,chk.id,'EMPLOYER PAYROLL DIRECT DEP','Employer Inc',1640,'income','Primary Paycheck',{recurring:true});
    add(base+17,chk.id,'EMPLOYER PAYROLL DIRECT DEP','Employer Inc',1640,'income','Primary Paycheck',{recurring:true});
    // housing
    add(base+1,chk.id,'RENT PAYMENT','Greenfield Apartments',1150,'expense','Rent',{recurring:true});
    // utilities
    add(base+6,chk.id,'DUKE ENERGY','Duke Energy',128.40,'expense','Electricity',{recurring:true});
    add(base+8,chk.id,'MOBILE PHONE','Telco Mobile',62.00,'expense','Phone',{recurring:true});
    // subscriptions (price bump in most recent month)
    add(base+10,chk.id,'NETFLIX.COM','Netflix',mo===0?17.99:15.99,'expense','Streaming',{recurring:true});
    add(base+11,chk.id,'SPOTIFY','Spotify',10.99,'expense','Music',{recurring:true});
    // food
    add(base+4,cc.id,'WALMART SUPERCENTER','Walmart',82.13+mo*4,'expense','Groceries');
    add(base+13,cc.id,'KROGER #418','Kroger',64.77,'expense','Groceries');
    add(base+22,cc.id,'ALDI','Aldi',48.20,'expense','Groceries');
    add(base+5,cc.id,'RAISING CANES','Raising Canes',14.85,'expense','Fast Food');
    add(base+12,cc.id,'JAY FOODS','Jay Foods',12.50,'expense','Dining Out');
    add(base+19,cc.id,'DOORDASH','DoorDash',mo===0?34.40:21.90,'expense','Food Delivery',mo===0?{notes:'Group order'}:{});
    // transportation
    add(base+7,cc.id,'EXXON','Exxon',41.30,'expense','Fuel');
    add(base+21,cc.id,'MARATHON','Marathon',38.75,'expense','Fuel');
    // shopping
    add(base+15,cc.id,'AMAZON.COM','Amazon',mo===1?212.45:34.99,'expense','Amazon',mo===1?{notes:'Replaced microwave'}:{});
    add(base+16,cc.id,'AMERICAN EAGLE','American Eagle',mo===2?58.20:0.00,'expense','Clothing');
    // entertainment & travel
    add(base+20,cc.id,'KILROYS','Kilroys',mo!==1?27.50:0,'expense','Bars & Nightlife');
    // card payment from checking (transfer, excluded)
    add(base+24,chk.id,'PAYMENT TO REWARDS VISA','Rewards Visa',300,'expense',null,{transfer:true,signed:-300,recurring:true,sub:'Credit card payment'});
    add(base+24,cc.id,'PAYMENT - THANK YOU','Payment',300,'income',null,{transfer:true,signed:300,sub:'Credit card payment'});
    // transfer to savings
    add(base+18,chk.id,'TRANSFER TO SAVINGS','Savings',100,'expense',null,{transfer:true,signed:-100,recurring:true,sub:'Investment/savings transfer'});
    add(base+18,sav.id,'TRANSFER FROM CHECKING','Checking',100,'income',null,{transfer:true,signed:100,sub:'Investment/savings transfer'});
    // debt
    add(base+14,chk.id,'DEPT EDUCATION STUDENT','EdFinance Servicing',180,'expense',null,{recurring:true,transfer:true,signed:-180,sub:'Loan payment'});
  }
  // drop the zero-amount placeholders (months where a line was 0)
  S.transactions=tx.filter(t=>t.amount>0);

  // Debts
  S.debts=[
    {id:'debt_cc',name:'Rewards Visa',lender:'Sample Card Co',type:'credit',originalPrincipal:1600,currentBalance:1290.30,apr:23.99,rateType:'variable',minPayment:45,dueDay:15,creditLimit:3000,promoRate:'',promoExpiration:'',startDate:'',termMonths:'',notes:'',payments:[
      {month:monthKey(new Date(today.getFullYear(),today.getMonth()-1,1)),date:toISODate(new Date(today.getFullYear(),today.getMonth()-1,24)),minPayment:45,actualPaid:300,extraPrincipal:0,fees:0,newCharges:250,interest:26,principal:24}
    ]},
    {id:'debt_sl',name:'Federal Student Loan',lender:'EdFinance Servicing',type:'student',originalPrincipal:12000,currentBalance:9450.00,apr:5.50,rateType:'fixed',minPayment:180,dueDay:14,creditLimit:'',promoRate:'',promoExpiration:'',startDate:'2021-09-01',termMonths:120,notes:'Federal Direct Subsidized — eligible for income-driven repayment & PSLF. Do not refinance without review.',payments:[
      {month:monthKey(new Date(today.getFullYear(),today.getMonth()-1,1)),date:toISODate(new Date(today.getFullYear(),today.getMonth()-1,14)),minPayment:180,actualPaid:180,extraPrincipal:0,fees:0,newCharges:0,interest:43.31,principal:136.69}
    ]}
  ];

  // Investments
  S.investments=[
    {id:'inv_401k',name:'Workplace 401(k)',type:'401k',holdings:[
      {id:'h_tdf',ticker:'TDF2055',name:'Target Date 2055 Fund',quantity:120.5,avgPrice:24.10,costBasis:2904.05,currentPrice:25.40,currentValue:3060.70,contributions:2904.05,dividends:0,fees:0,employerMatch:680,lastValuation:toISODate(today),activity:[
        {type:'contribution',date:toISODate(new Date(today.getFullYear(),today.getMonth()-1,2)),amount:180},
        {type:'contribution',date:toISODate(new Date(today.getFullYear(),today.getMonth(),2)),amount:180}
      ]}
    ]}
  ];

  // Budgets — set at the SUBCATEGORY level (key = "Category › Subcategory"); category totals are the sum.
  S.budgets.recurring={
    'Housing › Rent':1150,
    'Utilities › Electricity':130,'Utilities › Phone':65,
    'Food › Groceries':260,'Food › Dining Out':40,'Food › Fast Food':35,'Food › Food Delivery':30,
    'Transportation › Fuel':90,
    'Shopping › Amazon':60,'Shopping › Clothing':40,
    'Subscriptions › Streaming':18,'Subscriptions › Music':11,
    'Entertainment & Travel › Bars & Nightlife':40
  };

  // Categorization rules target a subcategory (category derives automatically)
  S.rules=[
    {id:'rule_walmart',enabled:true,order:0,field:'description',matchType:'contains',value:'WALMART',subcategory:'Groceries',category:'Food',transfer:false},
    {id:'rule_kroger',enabled:true,order:1,field:'description',matchType:'contains',value:'KROGER',subcategory:'Groceries',category:'Food',transfer:false},
    {id:'rule_exxon',enabled:true,order:2,field:'description',matchType:'contains',value:'EXXON',subcategory:'Fuel',category:'Transportation',transfer:false},
    {id:'rule_amazon',enabled:true,order:3,field:'description',matchType:'contains',value:'AMAZON',subcategory:'Amazon',category:'Shopping',transfer:false},
    {id:'rule_netflix',enabled:true,order:4,field:'description',matchType:'contains',value:'NETFLIX',subcategory:'Streaming',category:'Subscriptions',transfer:false}
  ];

  save();
}
/* =====================================================================
   BOOT
   ===================================================================== */
async function boot(){
  await loadState();
  // Probe persistence so the badge is accurate from the start.
  try{ await Store.set(STORAGE_KEY+'_probe','1'); if(window.storage&&typeof window.storage.delete==='function'){ try{ await window.storage.delete(STORAGE_KEY+'_probe'); }catch(e){} } try{ localStorage.removeItem(STORAGE_KEY+'_probe'); }catch(e){} }catch(e){}
  buildNav();
  updatePersistBadge();
  // First-ever run: state exists but setup not done and no accounts -> show wizard.
  render();
}
/* The cloud layer (js/auth.js) decides when to run boot() — after a session
   is resolved, or immediately in local-only mode. It calls window.__blackInkBoot. */
window.__blackInkBoot = boot;
(function(){
  function _start(){
    if (window.BlackInkApp && typeof window.BlackInkApp.start === 'function'){ window.BlackInkApp.start(); }
    else { boot(); }   // fallback: cloud layer failed to load → plain local mode
  }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', _start); } else { _start(); }
})();
</script>
