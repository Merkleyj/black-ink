<style>
  :root{
    /* ---- color tokens ---- */
    --ink:#0f1b2e;          /* dark navy - primary text & headers */
    --ink-2:#334155;
    --paper:#eef2f7;        /* cool-gray app canvas */
    --surface:#ffffff;      /* card / surface */
    --surface-2:#f1f5f9;    /* subtle gray fill */
    --line:#e3e8ef;         /* hairline border */
    --line-2:#eef2f7;
    --blue:#2563eb;         /* PRIMARY accent (overridable via data-accent) */
    --blue-2:#1d4ed8;
    --blue-soft:color-mix(in srgb, var(--blue) 13%, var(--surface));
    --teal:#16a34a;         /* POSITIVE (green) — name kept for compatibility */
    --teal-soft:color-mix(in srgb, var(--teal) 15%, var(--surface));
    --amber:#d97706;        /* WARNING */
    --amber-soft:color-mix(in srgb, var(--amber) 17%, var(--surface));
    --red:#dc2626;          /* NEGATIVE / over budget */
    --red-soft:color-mix(in srgb, var(--red) 14%, var(--surface));
    --violet:#7c5cd6;       /* legacy categorical */
    --muted:#64748b;
    --muted-2:#94a3b8;
    /* ---- elevation ---- */
    --shadow:0 1px 2px rgba(15,27,46,.05);
    --shadow-card:0 1px 3px rgba(15,27,46,.06);
    --shadow-lg:0 16px 48px rgba(15,27,46,.18);
    /* ---- radius ---- */
    --radius:16px;
    --radius-sm:11px;
    --r-xs:8px;
    /* ---- spacing scale ---- */
    --s-1:4px;--s-2:8px;--s-3:12px;--s-4:16px;--s-5:20px;--s-6:24px;--s-8:32px;
    /* ---- type ---- */
    --mono:'SF Mono',ui-monospace,'Cascadia Mono','Roboto Mono',Menlo,Consolas,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  /* ---- accent palettes (set via data-accent on <html>) ---- */
  :root[data-accent="indigo"]{--blue:#4f46e5;--blue-2:#4338ca}
  :root[data-accent="violet"]{--blue:#7c3aed;--blue-2:#6d28d9}
  :root[data-accent="cyan"]{--blue:#0891b2;--blue-2:#0e7490}
  :root[data-accent="teal"]{--blue:#0d9488;--blue-2:#0f766e}
  :root[data-accent="graphite"]{--blue:#475569;--blue-2:#334155}
  /* ---- dark theme ---- */
  :root[data-theme="dark"]{
    --ink:#e8edf5; --ink-2:#aeb9c8;
    --paper:#090e16; --surface:#1b283a; --surface-2:#243149;
    --line:#34435a; --line-2:#2b3a52;
    --muted:#8c99ab; --muted-2:#5d6a7d;
    --teal:#34d399; --amber:#fbbf24; --red:#f87171;
    --shadow:0 1px 2px rgba(0,0,0,.4);
    --shadow-card:0 1px 3px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.015);
    --shadow-lg:0 18px 50px rgba(0,0,0,.62);
  }
  :root[data-theme="dark"][data-accent="indigo"]{--blue:#818cf8;--blue-2:#6366f1}
  :root[data-theme="dark"][data-accent="violet"]{--blue:#a78bfa;--blue-2:#8b5cf6}
  :root[data-theme="dark"][data-accent="cyan"]{--blue:#22d3ee;--blue-2:#06b6d4}
  :root[data-theme="dark"][data-accent="teal"]{--blue:#2dd4bf;--blue-2:#14b8a6}
  :root[data-theme="dark"][data-accent="graphite"]{--blue:#94a3b8;--blue-2:#cbd5e1}
  :root[data-theme="dark"]:not([data-accent]),
  :root[data-theme="dark"][data-accent="blue"]{--blue:#60a5fa;--blue-2:#3b82f6}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    font-size:14px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
    transition:background .2s ease,color .2s ease;
  }
  h1,h2,h3,h4{margin:0;font-weight:600;letter-spacing:-.02em;color:var(--ink)}
  a{color:var(--blue);cursor:pointer;text-decoration:none}
  a:hover{text-decoration:underline}
  button{font-family:inherit}
  .num{font-family:var(--mono);font-feature-settings:"tnum" 1;letter-spacing:-.02em}

  /* ---------- Layout shell ---------- */
  .app{display:flex;min-height:100vh}
  .sidebar{
    width:236px;flex:0 0 236px;background:var(--surface);color:var(--ink-2);
    display:flex;flex-direction:column;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);
  }
  .brand{padding:22px 20px 18px;display:flex;align-items:center;gap:11px}
  .brand .mark{width:34px;height:34px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;box-shadow:0 2px 8px rgba(37,99,235,.28)}
  .brand .mark svg{width:19px;height:19px}
  .brand b{color:var(--ink);font-size:15.5px;letter-spacing:-.02em;font-weight:600}
  nav.tabs{padding:8px 12px;flex:1;overflow-y:auto}
  nav.tabs button{
    width:100%;text-align:left;background:none;border:0;color:var(--muted);
    padding:9px 11px;border-radius:10px;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:11px;margin-bottom:1px;font-weight:500;transition:.12s;
  }
  nav.tabs button .ic{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;color:var(--muted-2)}
  nav.tabs button .ic svg{width:18px;height:18px}
  nav.tabs button:hover{background:var(--surface-2);color:var(--ink)}
  nav.tabs button:hover .ic{color:var(--ink-2)}
  nav.tabs button.active{background:var(--blue-soft);color:var(--blue);font-weight:600}
  nav.tabs button.active .ic{color:var(--blue)}
  nav.tabs .navlabel{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted-2);padding:16px 11px 6px;font-weight:600}
  .sidebar .foot{padding:14px 18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted)}
  .persist-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;background:var(--teal)}
  .persist-dot.off{background:var(--amber)}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    background:var(--surface);border-bottom:1px solid var(--line);padding:12px 22px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:30;
  }
  .topbar h2{font-size:20px;font-weight:600;letter-spacing:-.02em}
  .topbar .spacer{flex:1}
  .content{padding:28px 32px;max-width:1340px;width:100%}

  /* ---------- Controls ---------- */
  select,input[type=text],input[type=number],input[type=date],input[type=month],textarea{
    font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;
    padding:7px 9px;background:var(--surface);color:var(--ink);outline:none;
  }
  select:focus,input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
  label.fld{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:4px}
  .btn{
    border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:8px 13px;border-radius:9px;
    font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.12s;
  }
  .btn:hover{background:var(--surface-2)}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.primary:hover{background:var(--blue-2)}
  .btn.danger{background:var(--surface);border-color:var(--red);color:var(--red)}
  .btn.danger:hover{background:var(--red-soft)}
  .btn.sm{padding:5px 9px;font-size:12px;border-radius:7px}
  .btn.ghost{border-color:transparent;background:transparent}
  .btn.ghost:hover{background:var(--surface-2)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--surface-2);color:var(--ink-2)}
  .pill.teal{background:var(--teal-soft);color:#15803d}
  .pill.amber{background:var(--amber-soft);color:#8a560f}
  .pill.red{background:var(--red-soft);color:#8f2c2c}
  .pill.blue{background:var(--blue-soft);color:#274c70}
  :root[data-theme="dark"] .pill.blue{color:#a9cdf3;background:color-mix(in srgb, var(--blue) 22%, transparent)}
  :root[data-theme="dark"] .pill.teal{color:#6fe3a4;background:color-mix(in srgb, var(--teal) 22%, transparent)}
  :root[data-theme="dark"] .pill.green{color:#6fe3a4;background:color-mix(in srgb, var(--teal) 22%, transparent)}
  :root[data-theme="dark"] .pill.amber{color:#f3c577;background:color-mix(in srgb, var(--amber) 24%, transparent)}
  :root[data-theme="dark"] .pill.red{color:#f1a0a0;background:color-mix(in srgb, var(--red) 24%, transparent)}
  .kind-tag{display:inline-flex;align-items:center;gap:5px;padding:2px 9px 2px 7px;border:1px solid var(--line);border-radius:6px;background:transparent;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2);white-space:nowrap}
  .kind-tag .kglyph{font-size:12px;font-weight:800;line-height:1;opacity:.85}
  .kind-tag.income{color:#15803d;border-color:color-mix(in srgb,#16a34a 30%,var(--line))}
  .kind-tag.expense{color:var(--ink-2)}
  .kind-tag.transfer{color:#2c5d8a;border-color:color-mix(in srgb,#2563eb 28%,var(--line))}
  .pill.green{background:#d8f3e0;color:#15803d}
  .cls-chip{cursor:pointer}
  .cls-chip:hover{filter:brightness(0.96)}
  .cls-tag{margin-left:6px;font-size:9px;font-weight:800;text-transform:uppercase;opacity:.85}
  .cls-mini{font-size:9px;font-weight:700;text-transform:uppercase;padding:1px 6px}

  .btn .bic,.btn .bic svg{width:15px;height:15px;display:inline-flex;align-items:center}

  /* ---------- Cards ---------- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:18px}
  .card:has(>.hd),.card:has(>.bd){padding:0}
  /* consistent vertical rhythm between top-level blocks in every tab */
  #content>.card,#content>.obs-card{margin-bottom:18px}
  #content>.card:last-child{margin-bottom:0}
  .card .hd{padding:16px 18px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px}
  .card .hd h3{font-size:15.5px;font-weight:600}
  .card .hd .sub{font-size:12px;color:var(--muted);font-weight:500}
  .card .bd{padding:18px}
  .grid{display:grid;gap:16px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:13px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 17px;box-shadow:var(--shadow-card);position:relative}
  .kpi .lbl{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px}
  .kpi .val{font-size:25px;font-weight:600;margin-top:8px;letter-spacing:-.025em}
  .kpi .delta{font-size:11.5px;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:4px}
  .up{color:var(--teal)} .down{color:var(--red)} .flat{color:var(--muted)}
  .val.pos{color:var(--teal)} .val.neg{color:var(--red)}

  /* ---------- Tables ---------- */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;padding:9px 8px;border-bottom:1px solid var(--line);cursor:default}
  th.sortable{cursor:pointer;user-select:none}
  th.sortable:hover{color:var(--ink)}
  td{padding:9px 10px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  tbody tr:hover{background:var(--surface-2)}
  td.r,th.r{text-align:right}
  .tag{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:6px;background:var(--surface-2);color:var(--ink-2);margin:1px 2px 1px 0}
  .cat-chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;cursor:pointer;border:1px solid var(--line)}
  .table-scroll{overflow:auto;max-height:none}
  .row-actions{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end}
  .row-actions .btn{padding:4px 9px;font-size:11.5px}
  .chart-filter{font-size:12px;padding:4px 8px;border:1px solid var(--line);border-radius:7px;background:var(--surface);color:var(--ink);max-width:180px}

  .bar-track{height:8px;border-radius:999px;background:var(--surface-2);overflow:hidden}
  .bar-fill{height:100%;border-radius:999px;background:var(--blue);transition:width .3s}
  .bar-fill.over{background:var(--red)}
  .bar-fill.warn{background:var(--amber)}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(21,32,43,.45);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .overlay.hidden{display:none}
  .modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:680px;margin:auto 0;overflow:hidden}
  .modal.wide{max-width:920px}
  .modal .mhd{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .modal .mhd h3{font-size:16px;flex:1}
  .modal .mbd{padding:20px;max-height:68vh;overflow-y:auto}
  .modal .mft{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;background:var(--surface-2)}
  .x{cursor:pointer;border:0;background:none;font-size:20px;color:var(--muted);line-height:1;padding:4px}
  .x:hover{color:var(--ink)}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .form-grid .full{grid-column:1/-1}
  .form-grid input,.form-grid select,.form-grid textarea{width:100%}

  /* ---------- Toast ---------- */
  #toasts{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--ink);color:#fff;padding:11px 15px;border-radius:10px;font-size:13px;box-shadow:var(--shadow-lg);max-width:340px;animation:slidein .2s}
  .toast.warn{background:var(--amber)} .toast.err{background:var(--red)} .toast.ok{background:var(--teal)}
  @keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

  /* ---------- Empty states ---------- */
  .empty{text-align:center;padding:42px 20px;color:var(--muted)}
  .empty .big{font-size:30px;margin-bottom:10px;opacity:.5}
  .empty h4{color:var(--ink-2);margin-bottom:6px;font-size:15px}
  .empty p{margin:0 auto 14px;max-width:380px;font-size:13px}

  .filterbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface)}
  .seg button{border:0;background:none;padding:7px 11px;font-size:12.5px;cursor:pointer;color:var(--muted);font-weight:600;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.active{background:var(--blue);color:#fff}

  .hint{font-size:12px;color:var(--muted);background:var(--surface-2);border-radius:8px;padding:8px 11px;border-left:3px solid var(--blue)}
  .warnbox{font-size:12.5px;background:var(--amber-soft);border-radius:8px;padding:9px 12px;border-left:3px solid var(--amber);color:var(--amber)}
  .infobox{font-size:12.5px;background:var(--blue-soft);border-radius:8px;padding:9px 12px;border-left:3px solid var(--blue);color:var(--blue)}

  .tip{position:relative;border-bottom:1px dotted var(--muted-2);cursor:help}
  .tip .tiptext{visibility:hidden;opacity:0;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--surface);padding:8px 11px;border-radius:8px;font-size:11.5px;font-weight:400;width:230px;z-index:50;box-shadow:var(--shadow-lg);transition:.15s;line-height:1.4;text-transform:none;letter-spacing:0}
  .tip:hover .tiptext{visibility:visible;opacity:1}

  .chart-wrap{position:relative;height:260px}
  .chart-wrap.tall{height:300px}
  .chart-wrap.wide{height:300px}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.bud-grid{display:grid;grid-template-columns:minmax(270px,330px) 1fr;gap:18px;align-items:stretch}
.bud-grid .card{margin:0;display:flex;flex-direction:column}
.bud-grid .card .bd{flex:1}
@media(max-width:920px){.bud-grid{grid-template-columns:1fr}}
  .three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

  .checkrow{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0}
  .stepper{display:flex;gap:6px;margin-bottom:18px}
  .stepper .dot{flex:1;height:5px;border-radius:999px;background:var(--line)}
  .stepper .dot.done{background:var(--teal)}
  .wizard-step h3{font-size:18px;margin-bottom:4px}
  .wizard-step .lead{color:var(--muted);font-size:13px;margin-bottom:16px}

  .acct-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
  .mini{font-size:11px;color:var(--muted)}
  .divider{height:1px;background:var(--line-2);margin:16px 0}
  .flag{display:flex;gap:10px;padding:10px 12px;border-radius:9px;background:var(--surface-2);margin-bottom:8px;align-items:flex-start}
  .flag .fic{font-size:16px}
  .flag.warn{background:var(--amber-soft)} .flag.err{background:var(--red-soft)} .flag.ok{background:var(--teal-soft)}

  @media (max-width:880px){
    .sidebar{position:fixed;left:-240px;z-index:120;transition:.2s;box-shadow:var(--shadow-lg)}
    .sidebar.open{left:0}
    .two-col,.three-col,.form-grid{grid-template-columns:1fr}
    .content{padding:14px}
    .topbar{padding:calc(10px + env(safe-area-inset-top)) 14px 10px;flex-wrap:nowrap;gap:8px}
    .topbar h2{font-size:17px;flex:0 0 auto;white-space:nowrap}
    .topbar .spacer{display:none}
    #globalFilters{flex:1 1 auto;min-width:0;justify-content:flex-end;gap:6px}
    #globalFilters>select{flex:1 1 40%;min-width:0;font-size:12px;padding:6px 7px}
    .kpi .val{font-size:20px}
    #toasts{bottom:calc(78px + env(safe-area-inset-bottom));right:12px;left:12px}
  }
  .menu-btn{display:none}
  .scrim{display:none}
  .scrim.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:110}
  /* ---- mobile bottom tab bar ---- */
  .bottombar{
    display:none;position:fixed;left:0;right:0;bottom:0;z-index:100;
    background:var(--surface);border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:max(6px, env(safe-area-inset-left));
    padding-right:max(6px, env(safe-area-inset-right));
    box-shadow:0 -2px 12px rgba(15,27,46,.06);
  }
  .bottombar button{
    flex:1;min-width:0;background:none;border:0;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:8px 2px 7px;color:var(--muted);font-size:10px;font-weight:600;transition:color .12s;
  }
  .bottombar button .ic{width:23px;height:23px;display:flex;align-items:center;justify-content:center}
  .bottombar button .ic svg{width:22px;height:22px}
  .bottombar button.active{color:var(--blue)}
  .bottombar button .lbl{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bottombar button:active{background:var(--surface-2)}
  @media (max-width:880px){ .bottombar{display:flex} }
  /* ---- "More" bottom sheet (replaces the side drawer on mobile) ---- */
  .sheet-scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;opacity:0;visibility:hidden;transition:opacity .2s}
  .sheet-scrim.show{opacity:1;visibility:visible}
  .more-sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:151;background:var(--surface);
    border-radius:18px 18px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.28);
    transform:translateY(105%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    padding:6px 16px calc(18px + env(safe-area-inset-bottom));max-height:82vh;overflow-y:auto;
  }
  .more-sheet.show{transform:translateY(0)}
  .more-sheet .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--line);margin:6px auto 12px}
  .more-sheet .sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .more-sheet .sheet-hd h3{font-size:16px}
  .more-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .more-grid button{
    display:flex;flex-direction:column;align-items:center;gap:8px;padding:15px 6px;
    border:1px solid var(--line);border-radius:13px;background:var(--surface);color:var(--ink);
    font-size:12px;font-weight:600;cursor:pointer;text-align:center;line-height:1.2;
  }
  .more-grid button .ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
  .more-grid button .ic svg{width:24px;height:24px}
  .more-grid button.active{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}
  .more-grid button.active .ic{color:var(--blue)}
  .more-grid button:active{background:var(--surface-2)}
  .more-foot{margin-top:15px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:12px}
  /* Freeze the page behind the sheet so a downward swipe dismisses instead of scrolling the background */
  body.sheet-open{position:fixed;left:0;right:0;width:100%;overflow:hidden}

  /* ============ OVERVIEW REDESIGN ============ */
  .ov-head{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:24px;flex-wrap:wrap}
  .ov-title{font-size:28px;font-weight:600;letter-spacing:-.03em;line-height:1.1}
  .ov-sub{margin:6px 0 0;color:var(--muted);font-size:13.5px;font-weight:450}
  .stack{display:flex;flex-direction:column;gap:18px}

  /* hero grid: net cash flow feature + 2x2 metrics */
  .ov-hero{display:grid;grid-template-columns:1.45fr 1fr 1fr;grid-template-rows:auto auto;gap:16px;margin-bottom:18px}
  .feature-card{grid-row:1 / span 2;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:24px;display:flex;flex-direction:column;position:relative;overflow:hidden}
  .feature-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
  .feature-card.pos::before{background:var(--teal)}
  .feature-card.neg::before{background:var(--red)}
  .fc-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .fc-label{font-size:13px;font-weight:600;color:var(--ink-2);letter-spacing:.01em}
  .fc-value{font-size:46px;font-weight:600;letter-spacing:-.035em;margin-top:14px;line-height:1}
  .fc-value.pos{color:var(--teal)} .fc-value.neg{color:var(--red)}
  .feature-card .delta{font-size:13px;margin-top:10px}
  .fc-bar{height:10px;border-radius:999px;background:var(--red-soft);overflow:hidden;margin-top:auto;display:flex}
  .fc-bar-in{height:100%;background:var(--teal);border-radius:999px}
  .fc-legend{display:flex;gap:18px;margin-top:11px;font-size:12.5px;color:var(--ink-2);font-weight:500;flex-wrap:wrap}
  .fc-legend .dot{width:8px;height:8px;border-radius:3px;display:inline-block;margin-right:6px}
  .dot-in{background:var(--teal)} .dot-out{background:#cbd5e1}

  .metric-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-card);padding:18px 20px;display:flex;flex-direction:column;min-height:120px}
  .mc-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .mc-label{font-size:12.5px;font-weight:600;color:var(--muted)}
  .mc-ic{color:var(--muted-2);display:inline-flex}
  .mc-ic svg{width:17px;height:17px}
  .mc-value{font-size:27px;font-weight:600;letter-spacing:-.03em;margin-top:12px}
  .mc-value.pos{color:var(--teal)} .mc-value.neg{color:var(--red)}
  .metric-card .delta{font-size:12px;margin-top:6px}
  .mc-spacer{margin-top:6px;height:16px}
  .delta{font-weight:600;display:flex;align-items:center;gap:4px}

  /* financial snapshot */
  .snap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:2px 28px;padding:4px 2px}
.pa-grid{display:grid;grid-template-columns:96px repeat(4,1fr);gap:2px 28px;padding:4px 2px;align-items:stretch}
.pa-rowlbl{display:flex;align-items:center;font-weight:700;font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted)}
@media(max-width:760px){.pa-grid{grid-template-columns:1fr 1fr;grid-template-rows:repeat(5,auto);grid-auto-flow:column;column-gap:18px;row-gap:0}.pa-rowlbl{padding:0 0 5px;border-bottom:1px solid var(--line)}}
  .snap-item{display:flex;flex-direction:column;gap:3px;padding:11px 0;border-bottom:1px solid var(--line-2)}
  .snap-l{font-size:11.5px;color:var(--muted);font-weight:500}
  .snap-v{font-size:18px;font-weight:600;letter-spacing:-.02em;color:var(--ink)}
  .snap-v.neg{color:var(--red)} .snap-v.warn{color:var(--amber)} .snap-v.pos{color:var(--teal)}

  /* overview split: wide chart + narrow attention */
  .ov-split{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}

  /* needs attention */
  .att-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column}
  .att-row{display:flex;gap:12px;align-items:flex-start;padding:13px 2px;border-bottom:1px solid var(--line-2);font-size:13px;line-height:1.5;color:var(--ink-2)}
  .att-row:last-child{border-bottom:0}
  .att-ic{flex:0 0 auto;width:30px;height:30px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center}
  .att-ic svg{width:16px;height:16px}
  .att-red .att-ic{background:var(--red-soft);color:var(--red)}
  .att-amber .att-ic{background:var(--amber-soft);color:var(--amber)}
  .att-note .att-ic{background:var(--blue-soft);color:var(--blue)}
  .att-text a{font-weight:600;white-space:nowrap}
  .att-clear{display:flex;gap:13px;align-items:center;padding:14px 4px;color:var(--ink-2)}
  .att-clear svg{width:34px;height:34px;color:var(--teal);flex:0 0 auto}
  .att-clear b{display:block;font-size:14px;color:var(--ink)}
  .att-clear span{font-size:12.5px;color:var(--muted)}

  /* budget progress */
  .bp-overall{display:flex;align-items:center;gap:18px;margin-bottom:18px;flex-wrap:wrap}
  .bp-overall .bp-big{font-size:24px;font-weight:600;letter-spacing:-.02em}
  .bp-overall .bp-track{flex:1;min-width:200px;height:12px;border-radius:999px;background:var(--surface-2);overflow:hidden}
  .bp-overall .bp-fill{height:100%;border-radius:999px;background:var(--blue)}
  .bp-rows{display:flex;flex-direction:column;gap:14px}
  .bp-row{display:grid;grid-template-columns:160px 1fr 150px;gap:14px;align-items:center}
  .bp-name{font-size:13px;font-weight:600;color:var(--ink)}
  .bp-bar{height:9px;border-radius:999px;background:var(--surface-2);overflow:hidden}
  .bp-bar i{display:block;height:100%;border-radius:999px;background:var(--blue)}
  .bp-bar i.warn{background:var(--amber)} .bp-bar i.over{background:var(--red)}
  .bp-fig{font-size:12.5px;color:var(--muted);text-align:right;font-family:var(--mono);letter-spacing:-.02em}
  .bp-fig .neg{color:var(--red)}

  @media (max-width:1080px){
    .ov-hero{grid-template-columns:1fr 1fr}
    .feature-card{grid-row:auto;grid-column:1 / -1}
    .ov-split{grid-template-columns:1fr}
    .bp-row{grid-template-columns:130px 1fr 130px}
  }
  @media (max-width:880px){
    /* metric cards two-up instead of full-width stacks */
    .ov-hero{grid-template-columns:1fr 1fr;gap:12px}
    .feature-card{grid-column:1 / -1;padding:18px}
    .fc-top{flex-wrap:wrap;gap:6px}
    .metric-card{min-height:0;padding:14px 15px}
    .mc-value{font-size:22px;margin-top:8px}
    .kpis{grid-template-columns:1fr 1fr;gap:10px}
    /* financial snapshot two-up */
    .snap-grid{grid-template-columns:1fr 1fr;column-gap:16px}
    .content{padding:16px 16px calc(72px + env(safe-area-inset-bottom));overflow-x:clip}
    .tip .tiptext{left:auto;right:0;transform:none;max-width:74vw}
    .ov-title{font-size:23px}
    .fc-value{font-size:38px}
    .bp-row{grid-template-columns:1fr;gap:6px}
    .bp-fig{text-align:left}
  }
</style>
</head>
<body>
<style>
  /* ---- supplemental styles for review / rules / quality / export / wizard ---- */
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:13px;margin-bottom:18px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .page-head h1{font-size:27px;margin:0 0 4px;letter-spacing:-.025em}
  .page-head .sub{color:var(--muted);font-size:13.5px;max-width:62ch;margin:0}
  .ph-actions,.btn-row{display:flex;gap:8px;flex-wrap:wrap}
  .nowrap{white-space:nowrap}
  .muted{color:var(--muted);font-size:13px}
  .r{text-align:right}
  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:7px 10px;border-bottom:1px solid var(--line)}
  table.tbl td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  table.tbl.compact td,table.tbl.compact th{padding:5px 9px}
  table.tbl tr:last-child td{border-bottom:none}
  .hd{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .hd h3{margin:0}
  .mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-top:6px}
  .mini-grid>div{display:flex;flex-direction:column;gap:2px}
  .mini-grid .ml{color:var(--muted);font-size:12px}
  .mini-grid b{font-size:17px}
  .icon-btn{border:1px solid var(--line);background:var(--surface);border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:13px;color:var(--ink);margin-left:3px}
  .icon-btn:hover{background:var(--paper)}
  .icon-btn.danger{color:var(--red);border-color:color-mix(in srgb,var(--red) 35%,var(--surface))}
  .okbox{border-left:4px solid var(--teal)}
  .obs-card .obs{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:8px}
  .obs li{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;line-height:1.45}
  .obs-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:0 0 auto;background:var(--muted)}
  .obs-good .obs-dot{background:var(--teal)}
  .obs-warn .obs-dot{background:var(--amber)}
  .obs-note .obs-dot{background:var(--blue)}
  .switch{position:relative;display:inline-block;width:34px;height:19px}
  .switch input{opacity:0;width:0;height:0}
  .switch::after{content:"";position:absolute;inset:0;background:#cdd3d0;border-radius:20px;transition:.15s}
  .switch::before{content:"";position:absolute;width:15px;height:15px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.15s;z-index:2}
  .switch input:checked~::after{}
  .switch:has(input:checked)::after{background:var(--teal)}
  .switch:has(input:checked)::before{transform:translateX(15px)}
  tr.rule-off{opacity:.5}
  @keyframes rowFlash{from{background:var(--blue-soft)}to{background:transparent}}
  tr.row-moved>td{animation:rowFlash .8s ease-out}
  tr[data-rule-id]{will-change:transform}
  .pager{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:14px 4px 4px}
  .pager .pager-gap{padding:0 2px;color:var(--muted)}
  .pager .pager-info{margin-left:auto;white-space:nowrap}
  .btn.sm[disabled]{opacity:.45;cursor:default;pointer-events:none}
  .ckline{display:inline-flex;align-items:center;gap:7px;font-size:13px;cursor:pointer}
  .ck-row{display:flex;gap:20px;flex-wrap:wrap;align-items:center}
  .uncat-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .uncat-row{display:grid;grid-template-columns:auto 1fr 210px;gap:10px;align-items:center;padding:8px;border:1px solid var(--line);border-radius:9px}
  .ur-sel-chk{width:17px;height:17px;cursor:pointer}
  .unc-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0 4px;padding:8px 10px;background:color-mix(in srgb,var(--blue) 5%,var(--surface));border:1px solid var(--line);border-radius:9px}
  .unc-toolbar .spacer{flex:1}
  .uncat-row .ur-main{display:flex;flex-direction:column}
  .ur-kw{font-weight:600;font-size:13px;color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:4px 8px;text-transform:uppercase;width:100%;max-width:280px;margin-bottom:3px}
  .ur-kw:focus{outline:2px solid color-mix(in srgb,var(--blue) 40%,transparent);border-color:var(--blue)}
  .ur-chk{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
  .feature{border:1px solid color-mix(in srgb,var(--blue) 32%,var(--line));background:color-mix(in srgb,var(--blue) 5%,var(--surface))}
  .snapshot-preview{background:#0f1a22;color:#d6e2dd;padding:14px;border-radius:10px;font-size:12px;line-height:1.5;max-height:420px;overflow:auto;white-space:pre-wrap;margin-top:12px}
  .report-view{background:#fff;color:#1a2b33;border:1px solid var(--line);border-radius:12px;padding:32px 36px;margin-top:14px;max-height:580px;overflow:auto;font-family:Georgia,'Times New Roman',serif;line-height:1.55;font-size:13.5px}
  .report-view h1{font-size:23px;margin:0 0 4px}
  .report-view h2{font-size:17px;margin:26px 0 9px;padding-bottom:5px;border-bottom:2px solid #0f766e;color:#1a2b33}
  .report-view h3{font-size:13.5px;margin:16px 0 5px;color:#0f766e}
  .report-view p{margin:7px 0} .report-view em{color:#5b6b73}
  .report-view hr{border:none;border-top:1px solid #dde5e8;margin:20px 0}
  .report-view table{border-collapse:collapse;width:100%;margin:11px 0;font-size:12px;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .report-view th,.report-view td{border:1px solid #dde5e8;padding:6px 9px;text-align:left;vertical-align:top}
  .report-view th{background:#f2f6f7;font-weight:700} .report-view tbody tr:nth-child(even){background:#fafcfc}
  .report-view ul,.report-view ol{margin:7px 0 7px 22px}
  .filebtn{display:inline-flex;align-items:center;cursor:pointer}
  /* wizard */
  .wizard{max-width:760px;margin:0 auto}
  .wiz-steps{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
  .wiz-step{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:4px 8px;border-radius:20px}
  .wiz-step .num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#dfe4e1;font-size:11px;font-weight:700}
  .wiz-step.active{color:var(--ink);font-weight:600}
  .wiz-step.active .num{background:var(--teal);color:#fff}
  .wiz-step.done .num{background:var(--teal);color:#fff}
  .wiz-body{min-height:240px}
  .wiz-body h1{font-size:22px;margin:0 0 10px}
  .wiz-body p{font-size:14px;line-height:1.55;color:var(--ink-2);max-width:62ch}
  .wiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
  .wiz-skip{text-align:center;margin-top:12px}
  .wiz-skip a,.wiz-body a{color:var(--teal)}
  .wiz-items{display:flex;flex-direction:column;gap:6px;margin:10px 0}
  .wiz-item{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--paper);border-radius:8px;font-size:13px}
  .wiz-add{margin:12px 0}
  .wiz-summary{font-size:14px;line-height:1.7}
  .cat-chip{display:inline-block;background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:1px 9px;font-size:12px}
  /* ---- V2: subcategory UI ---- */
  .sub-chip{display:inline-block;margin-left:5px;background:transparent;border:1px dashed var(--line);border-radius:20px;padding:1px 8px;font-size:11px;color:var(--muted);cursor:pointer}
  .sub-chip:hover{border-color:var(--teal);color:var(--teal)}
  .sub-chip.add{font-style:italic;opacity:.75}
  .cat-chip.add{border:1px dashed var(--line);color:var(--muted);cursor:pointer;font-style:italic}
  .cat-chip.add:hover{border-color:var(--teal);color:var(--teal)}
  .readout{padding:8px 10px;background:var(--paper);border:1px solid var(--line);border-radius:8px;font-weight:600;font-size:13px}
  .caret{display:inline-block;width:16px;text-align:center;cursor:pointer;color:var(--muted);font-size:11px;margin-right:4px;user-select:none}
  .caret.empty{cursor:default}
  .caret:hover{color:var(--ink)}
  tr.catrow.expanded{background:rgba(15,122,107,.03)}
  tr.subrow td{background:rgba(0,0,0,.015);border-bottom:1px solid var(--line)}
  tr.subrow .subname{padding-left:26px;color:var(--ink-2);font-size:12.5px}
  tr.subrow.subnote td{background:transparent;color:var(--muted);padding-top:2px;padding-bottom:8px}
  .bar-track.sm{height:7px}

  /* ---- appearance controls ---- */
  .appear-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:22px}
  .theme-seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
  .theme-seg button{display:flex;align-items:center;gap:7px;border:0;background:none;color:var(--muted);font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer}
  .theme-seg button svg{width:15px;height:15px}
  .theme-seg button.on{background:var(--surface);color:var(--blue);box-shadow:var(--shadow)}
  .swatch-row{display:flex;gap:10px;flex-wrap:wrap}
  .swatch{width:34px;height:34px;border-radius:9px;border:2px solid transparent;cursor:pointer;position:relative;padding:0;outline:none;transition:transform .1s}
  .swatch:hover{transform:translateY(-1px)}
  .swatch.on{border-color:var(--ink)}
  .swatch.on::after{content:"";position:absolute;inset:0;display:flex;background:no-repeat center/14px url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='3.4' stroke-linecap='round' stroke-linejoin='round'><path d='M5 12l4 4L19 7'/></svg>")}
  .appear-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:9px;text-transform:uppercase;letter-spacing:.05em}

  /* ---- mobile: two-up KPI/stat rows across all tabs ---- */
  @media (max-width:880px){
    .kpi-row{grid-template-columns:1fr 1fr;gap:10px}
    .mini-grid{grid-template-columns:1fr 1fr}
    .grid-2{grid-template-columns:1fr;gap:14px}   /* Review: stack paired blocks vertically */
    .kpi{padding:13px 14px}
    .kpi .val{font-size:20px}

    /* Transactions: table rows become stacked cards */
    #txTableWrap table,#txTableWrap tbody{display:block}
    #txTableWrap thead{display:none}
    #txTableWrap tr{
      display:grid;grid-template-columns:1fr auto;column-gap:10px;row-gap:3px;
      align-items:start;padding:12px 14px;margin-bottom:10px;
      border:1px solid var(--line);border-radius:12px;background:var(--surface);
    }
    #txTableWrap td{display:block;border:none;padding:0}
    #txTableWrap td:nth-child(1),#txTableWrap td:nth-child(6){display:none} /* checkbox, kind */
    #txTableWrap td:nth-child(3){grid-row:1;grid-column:1;font-weight:600;font-size:14px;color:var(--ink)} /* merchant */
    #txTableWrap td:nth-child(7){grid-row:1;grid-column:2;text-align:right;font-weight:700;font-size:15px} /* amount */
    #txTableWrap td:nth-child(2){grid-row:2;grid-column:1;font-size:12px;color:var(--muted)} /* date */
    #txTableWrap td:nth-child(4){grid-row:2;grid-column:2;text-align:right;font-size:12px;color:var(--muted)} /* account */
    #txTableWrap td:nth-child(5){grid-row:3;grid-column:1;margin-top:2px} /* category */
    #txTableWrap td:nth-child(8){grid-row:3;grid-column:2;text-align:right} /* edit */

    /* Budget › By category: rows become cards with labelled stats */
    #budCatWrap table,#budCatWrap tbody{display:block}
    #budCatWrap thead{display:none}
    #budCatWrap tr.catrow,#budCatWrap tr.subrow{
      display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px 10px;
      padding:11px 13px;margin-bottom:8px;border:1px solid var(--line);border-radius:11px;
      background:var(--surface);align-items:start;
    }
    #budCatWrap tr.catrow td,#budCatWrap tr.subrow td{display:block;border:none;padding:0;text-align:left!important}
    #budCatWrap tr.catrow td:nth-child(1),#budCatWrap tr.subrow td:nth-child(1){grid-column:1/-1;font-weight:600;margin-bottom:3px}
    #budCatWrap tr.catrow td:nth-child(2),#budCatWrap tr.subrow td:nth-child(2){grid-column:1}
    #budCatWrap tr.catrow td:nth-child(3),#budCatWrap tr.subrow td:nth-child(3){grid-column:2}
    #budCatWrap tr.catrow td:nth-child(4),#budCatWrap tr.subrow td:nth-child(4){grid-column:3}
    #budCatWrap tr.catrow td:nth-child(2)::before,#budCatWrap tr.subrow td:nth-child(2)::before,
    #budCatWrap tr.catrow td:nth-child(3)::before,#budCatWrap tr.subrow td:nth-child(3)::before,
    #budCatWrap tr.catrow td:nth-child(4)::before,#budCatWrap tr.subrow td:nth-child(4)::before{
      display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;margin-bottom:1px;
    }
    #budCatWrap tr.catrow td:nth-child(2)::before,#budCatWrap tr.subrow td:nth-child(2)::before{content:"Budget"}
    #budCatWrap tr.catrow td:nth-child(3)::before,#budCatWrap tr.subrow td:nth-child(3)::before{content:"Actual"}
    #budCatWrap tr.catrow td:nth-child(4)::before,#budCatWrap tr.subrow td:nth-child(4)::before{content:"Left"}
    #budCatWrap tr.catrow td:nth-child(5),#budCatWrap tr.subrow td:nth-child(5){grid-column:1/-1;min-width:0!important;margin-top:4px}
    #budCatWrap tr.catrow td:nth-child(6),#budCatWrap tr.catrow td:nth-child(7),
    #budCatWrap tr.subrow td:nth-child(6),#budCatWrap tr.subrow td:nth-child(7){display:none}
    #budCatWrap tr.subrow{margin-left:12px;margin-right:12px;background:var(--surface-2)}
    #budCatWrap tr.subrow .subname{padding-left:0}
    #budCatWrap tr.subrow.subnote{display:block;border:none;background:none;margin:2px 2px 10px;padding:0}

  }

<script>
/* =====================================================================
   PERSISTENCE  — uses the artifact window.storage API when available,
   falls back to an in-memory object (data lost on reload) otherwise.
   We never use localStorage (unsupported in this environment).
   ===================================================================== */
const STORAGE_KEY = 'pfd_state_v1';
let PERSIST = false;
const memFallback = {};

const Store = {
  async get(key){
    if (window.storage && typeof window.storage.get === 'function'){
      try{ const r = await window.storage.get(key); if(r) return r.value; }
      catch(e){}
    }
    try{ const v = localStorage.getItem(key); if(v!==null){ PERSIST=true; return v; } }
    catch(e){}
    return memFallback[key] ?? null;
  },
  async set(key,value){
    if (window.storage && typeof window.storage.set === 'function'){
      try{ await window.storage.set(key,value); PERSIST=true; return true; }
      catch(e){}
    }
    try{ localStorage.setItem(key,value); PERSIST=true; return true; }
    catch(e){}
    memFallback[key]=value; return false;
  }
};

/* =====================================================================
   STATE
   ===================================================================== */
let S = null;             // the live application state
let activeTab = 'overview';
let filter = { account:'all', preset:'thisMonth', start:null, end:null, otherMonth:{year:new Date().getFullYear(), month:new Date().getMonth()}, includeInactive:false };
let txView = { sort:'date', dir:'desc', search:'', cat:'all', sub:'all', type:'all', reviewOnly:false };
const charts = {};        // chart.js instance registry

/* Fixed taxonomy: [Category, classification, [subcategories...]].
   Subcategory names are unique across the tree, so a transaction's category
   is always derived from its subcategory. */
const TAXONOMY=[
  ['Income','income',['Primary Paycheck','Other Income']],
  ['Housing','need',['Rent','Renters Insurance','Property Taxes','Furniture','Appliances','Home Supplies','Lawn']],
  ['Utilities','need',['Electricity','Natural Gas','Water','Trash','Sewer','Internet','Phone','Utility Fees']],
  ['Food','need',['Groceries','Dining Out','Fast Food','Food Delivery']],
  ['Shopping','want',['Amazon','Clothing','Electronics','Retail']],
  ['Transportation','need',['Car Payment','Fuel','Auto Insurance','Maintenance','Registration','Parking','Tolls','Rideshare']],
  ['Entertainment & Travel','want',['Bars & Nightlife','Movies','Hobbies','Events','Flights','Lodging','Rentals','Vacation Activities']],
  ['Health & Personal','need',['Health Insurance','Medical Bills','Prescriptions','Vision & Dental','Therapy','Fitness','Hair','Skin/Toiletries']],
  ['Subscriptions','want',['Streaming','Music','Software/Apps','Cloud Storage','Memberships','Other Subscriptions']],
  ['Other','want',['Venmo','Bank Fees','Taxes','Legal Fees','Cash Withdrawals','Gifts','Donations','Uncategorized']],
];
function defaultCategories(){
  const cats=TAXONOMY.map(([name,cls,subs])=>({name, kind: name==='Income'?'income':'expense', classification:cls, subs:[...subs]}));
  // Internal transfer bucket (not shown in the subcategory picker) keeps
  // credit-card payments and inter-account moves out of income/spending.
  cats.push({name:'Transfers', kind:'transfer', classification:'transfer', subs:['Account transfer','Credit card payment','Loan payment','Investment/savings transfer']});
  return cats;
}

function newState(){
  return {
    version:1,
    setupDone:false,
    settings:{
      currency:'USD', locale:'en-US', beginMonth: monthKey(new Date()),
      budgetMethod:'custom', incomeSources:[], goals:[], utilThreshold:30,
      savingsFormula:'(income - spending) / income'
    },
    accounts:[], transactions:[], categories:defaultCategories(),
    rules:[], budgets:{recurring:{}, months:{}},
    debts:[], investments:[], manualAssets:[],
    csvMappings:{}, usingSample:false
  };
}

async function loadState(){
  const raw = await Store.get(STORAGE_KEY);
  if (raw){
    try{ S = JSON.parse(raw); migrate(S); }
    catch(e){ S = newState(); }
  } else {
    S = newState();
  }
}
function migrate(s){
  const d=newState();
  for(const k in d){ if(s[k]===undefined) s[k]=d[k]; }
  if(!s.settings) s.settings=d.settings;
  for(const k in d.settings){ if(s.settings[k]===undefined) s.settings[k]=d.settings[k]; }
  if(!s.budgets.recurring) s.budgets.recurring={};
  if(!s.budgets.months) s.budgets.months={};
  // Keep the built-in Transfers category's subcategories in sync with the current set.
  { const _tc=(s.categories||[]).find(c=>c.name==='Transfers'); if(_tc){ _tc.subs=_tc.subs||[]; ['Account transfer','Credit card payment','Loan payment','Investment/savings transfer'].forEach(sub=>{ if(_tc.subs.indexOf(sub)<0) _tc.subs.push(sub); }); } }
  // One-time: re-split logged payments so promo-rate periods credit principal instead of full-APR interest.
  if(s.settings && !s.settings.promoSplitFixed_v1){
    (s.debts||[]).forEach(d=>{
      const apr=Number(d.apr)||0;
      (d.payments||[]).forEach(p=>{
        const eff=effectiveApr(d, p.date);
        if(apr>0 && eff!==apr){
          const iOld=Number(p.interest)||0;
          const iNew=iOld*(eff/apr);
          const delta=iOld-iNew;
          if(delta>0){ p.interest=iNew; p.principal=Math.max(0,(Number(p.principal)||0)+delta); }
        }
      });
    });
    s.settings.promoSplitFixed_v1=true;
  }
  // One-time: repair transaction signs so income adds and expense subtracts.
  if(s.settings && !s.settings.signFix_v1){
    (s.transactions||[]).forEach(t=>{
      if(t.transfer) return;
      const inc = t.kind==='income' || t.flow==='income' || t.category==='Income' || (t.subcategory && subClassification(t.subcategory)==='income');
      t.signed=(inc?1:-1)*Math.abs(Number(t.amount)||0);
    });
    s.settings.signFix_v1=true;
  }
  // The short-lived Reimbursable category was removed. Strip it if an older
  // build of the app added it to stored data, so it stays deleted.
  if(s.categories) s.categories=s.categories.filter(c=>!(c.name==='Reimbursable'&&c.kind==='reimbursable'));
  // One-time: pre-select "flag for review" on the VENMO rule so imported Venmo
  // keeps getting flagged, as before. Toggle it in the rule editor any time.
  if(!s.settings.flagRulesSeed_v1){
    (s.rules||[]).forEach(r=>{ if(String(r.value||'').trim().toUpperCase()==='VENMO') r.flagReview=true; });
    s.settings.flagRulesSeed_v1=true;
  }
  // Uncategorized transactions live in the uncategorized queue already — a
  // review badge on top of that is a double queue. Strip stale ones once.
  if(!s.settings.reviewUncatClear_v1){
    (s.transactions||[]).forEach(t=>{ if(t.needsReview && !t.category && !t.subcategory) t.needsReview=false; });
    s.settings.reviewUncatClear_v1=true;
  }
  // Model A: Debt and Savings & Investments are tracked via transfers + their tabs, not as spending categories.
  const _removed={'Debt':1,'Savings & Investments':1};
  if(Array.isArray(s.categories) && s.categories.some(c=>_removed[c.name])){
    s.categories=s.categories.filter(c=>!_removed[c.name]);
    const _debtSub={'Credit Card':1,'Student Loans':1,'Other Loans':1};
    const _savSub={'Emergency Fund':1,'Savings':1,'Retirement':1,'Brokerage':1,'Cryptocurrency':1,'Real Estate':1,'Other Investments':1,'Investment Fees':1};
    const _toTransfer=(sub)=> sub==='Credit Card'?'Credit card payment':(sub==='Student Loans'||sub==='Other Loans')?'Loan payment':'Investment/savings transfer';
    (s.transactions||[]).forEach(t=>{
      if(t.category==='Debt'||t.category==='Savings & Investments'||_debtSub[t.subcategory]||_savSub[t.subcategory]){
        t.transfer=true; t.kind='transfer'; t.category='Transfers'; t.subcategory=_toTransfer(t.subcategory);
        if((t.signed||0)===0) t.signed=-Math.abs(t.amount||0);
      }
    });
    (s.rules||[]).forEach(r=>{ if(_debtSub[r.subcategory]||_savSub[r.subcategory]){ r.transfer=true; r.category='Transfers'; r.subcategory=_toTransfer(r.subcategory); } });
    const _drop=k=> k.indexOf('Debt')===0 || k.indexOf('Savings & Investments')===0;
    if(s.budgets){
      if(s.budgets.recurring) Object.keys(s.budgets.recurring).forEach(k=>{ if(_drop(k)) delete s.budgets.recurring[k]; });
      if(s.budgets.months) Object.values(s.budgets.months).forEach(mm=>{ if(mm&&typeof mm==='object') Object.keys(mm).forEach(k=>{ if(_drop(k)) delete mm[k]; }); });
    }
  }
}
let saveTimer=null;
async function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    await Store.set(STORAGE_KEY, JSON.stringify(S));
    updatePersistBadge();
  },120);
}
function updatePersistBadge(){
  const dot=document.getElementById('persistDot'), t=document.getElementById('persistText');
  if(PERSIST){ dot.classList.remove('off'); t.textContent='Saved to this browser'; }
  else { dot.classList.add('off'); t.textContent='In-memory only (no persistence)'; }
}

/* =====================================================================
   UTILITIES
   ===================================================================== */
const uid = (p='id') => p+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3);
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }

function money(n, withSign=false){
  n = Number(n)||0;
  const cur = S?.settings?.currency || 'USD';
  const loc = S?.settings?.locale || 'en-US';
  let out;
  try{ out = new Intl.NumberFormat(loc,{style:'currency',currency:cur,maximumFractionDigits:2}).format(Math.abs(n)); }
  catch(e){ out = '$'+Math.abs(n).toFixed(2); }
  if(withSign) return (n<0?'−':'+')+out;
  return (n<0?'−':'')+out;
}
function pct(n,digits=0){ return (Number(n)||0).toFixed(digits)+'%'; }
function fmtDate(d){
  if(!d) return '—';
  const dt = (d instanceof Date)? d : new Date(d+'T00:00:00');
  if(isNaN(dt)) return esc(d);
  return dt.toLocaleDateString(S?.settings?.locale||'en-US',{month:'short',day:'numeric',year:'numeric'});
}
function toISODate(d){ const dt=(d instanceof Date)?d:new Date(d); const z=new Date(dt.getTime()-dt.getTimezoneOffset()*60000); return z.toISOString().slice(0,10); }
function monthKey(d){ const dt=(d instanceof Date)?d:new Date(d+'T00:00:00'); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0'); }
function monthLabel(mk){ const [y,m]=mk.split('-'); return new Date(y,m-1,1).toLocaleDateString('en-US',{month:'short',year:'numeric'}); }
function parseNum(v){ if(v==null) return 0; const s=String(v).replace(/[^0-9.\-()]/g,'').replace(/^\((.*)\)$/,'-$1'); const n=parseFloat(s); return isNaN(n)?0:n; }

function toast(msg,type=''){ const c=document.getElementById('toasts'); const t=document.createElement('div'); t.className='toast '+type; t.textContent=msg; c.appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px)';setTimeout(()=>t.remove(),200);},3200); }

function confirmBox(title,msg,onYes,yesLabel='Confirm',danger=false){
  openModal(`<div class="mhd"><h3>${esc(title)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mbd"><p style="margin:0">${msg}</p></div>
    <div class="mft"><button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn ${danger?'danger':'primary'}" id="confirmYes">${esc(yesLabel)}</button></div>`);
  document.getElementById('confirmYes').onclick=()=>{ closeModal(); onYes(); };
}

/* Tooltip helper for financial terms */
function tip(text,term){ return `<span class="tip">${esc(term)}<span class="tiptext">${esc(text)}</span></span>`; }
const GLOSS = {
  apr:'APR (Annual Percentage Rate): the yearly cost of borrowing, including interest and most fees. A $1,000 balance at 24% APR costs roughly $20 in interest the first month if unpaid.',
  apy:'APY (Annual Percentage Yield): what you EARN on savings in a year, including compounding. $1,000 at 4% APY grows to about $1,040 after a year.',
  netcashflow:'Net cash flow = money in (income) minus money out (spending). Positive means you kept money this period; negative means you spent more than you earned.',
  savingsrate:'Savings rate = (income − spending) ÷ income. If you earn $3,000 and spend $2,400, you saved $600, a 20% savings rate.',
  utilization:'Credit utilization = card balance ÷ credit limit. $300 owed on a $1,000 limit = 30%. Lower is better for your credit score; under 30% is a common target.',
  costbasis:'Cost basis = what you originally paid for an investment, including fees. Your gain or loss is current value minus cost basis.',
  principal:'Principal = the amount you actually borrowed (or still owe), separate from interest. Paying extra principal shrinks the debt faster.',
  emergencyfund:'Emergency fund = cash set aside for surprises (car repair, medical bill, job loss). Coverage = fund ÷ essential monthly expenses, measured in months.',
  expenseratio:'Expense ratio = the yearly fee a fund charges, as a % of your money. 0.03% on $10,000 is $3/year; 1% is $100/year.',
  indexfund:'Index fund = a low-cost fund that holds a whole market (like the S&P 500) instead of picking stocks. Built-in diversification, low fees.',
  capitalization:'Capitalization = unpaid interest gets added to your loan principal, so you then pay interest on interest. Common with some student loans.'
};
/* =====================================================================
   DATE RANGE for the active filter
   ===================================================================== */
function activeRange(){
  const now=new Date(); let s,e;
  const ym=(y,m,d)=>new Date(y,m,d);
  switch(filter.preset){
    case 'thisMonth': s=ym(now.getFullYear(),now.getMonth(),1); e=ym(now.getFullYear(),now.getMonth()+1,0); break;
    case 'lastMonth': s=ym(now.getFullYear(),now.getMonth()-1,1); e=ym(now.getFullYear(),now.getMonth(),0); break;
    case 'otherMonth': { const om=filter.otherMonth||{year:now.getFullYear(),month:now.getMonth()}; s=ym(om.year,om.month,1); e=ym(om.year,om.month+1,0); break; }
    case 'last30': e=now; s=new Date(now.getTime()-29*864e5); break;
    case 'last90': e=now; s=new Date(now.getTime()-89*864e5); break;
    case 'ytd': s=ym(now.getFullYear(),0,1); e=now; break;
    case 'lastYear': s=ym(now.getFullYear()-1,0,1); e=ym(now.getFullYear()-1,11,31); break;
    case 'custom': s=filter.start?new Date(filter.start+'T00:00:00'):ym(now.getFullYear(),now.getMonth(),1); e=filter.end?new Date(filter.end+'T00:00:00'):now; break;
    case 'all': s=new Date(2000,0,1); e=new Date(2999,0,1); break;
    default: s=ym(now.getFullYear(),now.getMonth(),1); e=ym(now.getFullYear(),now.getMonth()+1,0);
  }
  return {start:toISODate(s), end:toISODate(e)};
}
function rangeLabel(){
  if(filter.preset==='all') return 'All time';
  const r=activeRange();
  return fmtDate(r.start)+' – '+fmtDate(r.end);
}
function isSingleMonth(){
  const r=activeRange();
  if(r.start.slice(0,7)!==r.end.slice(0,7)) return false;
  if(!r.start.endsWith('-01')) return false;
  const [y,m]=r.start.split('-').map(Number);
  const lastDay=new Date(y,m,0).getDate();
  return Number(r.end.slice(8,10))===lastDay; // full calendar month only
}

/* Accounts matching the current account filter */
function filteredAccountIds(){
  let accts = S.accounts.filter(a=> filter.includeInactive || a.active!==false);
  if(filter.account==='all') return accts.map(a=>a.id);
  if(filter.account==='checking') return accts.filter(a=>a.type==='checking').map(a=>a.id);
  if(filter.account==='savings') return accts.filter(a=>a.type==='savings').map(a=>a.id);
  if(filter.account==='credit') return accts.filter(a=>a.type==='credit').map(a=>a.id);
  return accts.filter(a=>a.id===filter.account).map(a=>a.id);
}

/* Transactions inside current range + account filter */
function filteredTx(opts={}){
  const r=activeRange();
  const ids=new Set(filteredAccountIds());
  return S.transactions.filter(t=>{
    if(t.date < r.start || t.date > r.end) return false;
    if(!ids.has(t.accountId)) return false;
    return true;
  });
}

/* CORE CLASSIFICATION
   - income: positive external inflow, not a transfer
   - spending: outflow that is consumption (not transfer, not debt principal, not investment contribution)
   We treat "transfer" flagged tx (incl. credit-card payments & investment contributions) as neither. */
/* True when the named category has kind 'transfer' — supports any number of
   user-created transfer categories, not just the built-in "Transfers". */
function isTransferCat(name){ if(!name) return false; if(name==='Transfers') return true; const c=(S&&S.categories||[]).find(x=>x.name===name); return !!(c && c.kind==='transfer'); }
function isTransfer(t){ return t.transfer===true || isTransferCat(t.category); }
/* Budget-attribution lines for a transaction. If it has splits, each split line
   is attributed by its own category; otherwise the whole transaction is one line.
   The CATEGORY decides the budget direction, not the bank direction:
     - Transfers                  -> wash (no budget effect)
     - Income                   -> income (money OUT of Income counts negative)
     - any expense category     -> spending; money IN = a refund, counted as
                                   NEGATIVE spending in that category
     - uncategorized            -> falls back to the bank direction
   Line amounts are SIGNED contributions to their bucket.
   NOTE: this drives the BUDGET only. Account balances always use the full signed
   amount (signedAmount), so neither splits nor refunds change a balance. */
function budgetLines(t){
  const moneyIn = signedAmount(t) >= 0;
  const lineFor=(m,cat,sub)=>{
    if(isTransferCat(cat)) return {amount:0, category:cat, subcategory:sub, dir:'wash'};
    if(cat==='Income') return {amount: moneyIn? m : -m, category:cat, subcategory:sub, dir:'income'};
    if(cat) return {amount: moneyIn? -m : m, category:cat, subcategory:sub, dir:'spending'};
    return {amount:m, category:'', subcategory:sub, dir: moneyIn?'income':'spending'};
  };
  if(Array.isArray(t.splits) && t.splits.length){
    return t.splits.map(s=>lineFor(Math.abs(Number(s.amount)||0), s.category||'', s.subcategory||''));
  }
  if(isTransfer(t)) return [{amount:0, category:t.category||'', subcategory:t.subcategory||'', dir:'wash'}];
  return [lineFor(Math.abs(Number(t.amount)||0), t.category||'', t.subcategory||'')];
}
function txFlow(t){
  let income=0, spending=0;
  for(const L of budgetLines(t)){ if(L.dir==='income') income+=L.amount; else if(L.dir==='spending') spending+=L.amount; }
  return {income, spending};
}

function analyze(txs){
  let income=0, spending=0;
  const byCat={}, byMerchant={}, byAccount={}, bySub={};
  const needsWants={need:0,want:0,savings:0,debt:0};
  txs.forEach(t=>{
    for(const L of budgetLines(t)){
      if(L.dir==='income'){ income+=L.amount; }
      else if(L.dir==='spending'){
        spending+=L.amount;
        byCat[L.category||'Uncategorized']=(byCat[L.category||'Uncategorized']||0)+L.amount;
        const sk=(L.category||'Uncat')+' › '+(L.subcategory||'—');
        bySub[sk]=(bySub[sk]||0)+L.amount;
        const m=t.merchant||t.description||'Unknown';
        byMerchant[m]=(byMerchant[m]||0)+L.amount;
        byAccount[t.accountId]=(byAccount[t.accountId]||0)+L.amount;
        const cls=subClassification(L.subcategory)||catClassification(L.category);
        if(needsWants[cls]!==undefined) needsWants[cls]+=L.amount; else needsWants.want+=L.amount;
      }
    }
    if(t.transfer && (t.signed||0)<0){
      const amt=Math.abs(t.amount)||0; const tc=subClassification(t.subcategory);
      if(tc==='debt') needsWants.debt+=amt;
      else if(tc==='savings') needsWants.savings+=amt;
    }
  });
  return {income,spending,net:income-spending,byCat,bySub,byMerchant,byAccount,needsWants,count:txs.length};
}
function catClassification(name){
  const c=S.categories.find(c=>c.name===name);
  return c? c.classification : 'want';
}

/* Needs/Wants/Savings/Debt are classified at the SUBCATEGORY level, since one
   category can mix them (e.g. Food: Groceries=need, Dining Out=want). */
const SUB_CLASS={
  'Rent':'need','Renters Insurance':'need','Property Taxes':'need','Furniture':'want','Appliances':'want','Home Supplies':'need','Lawn':'want',
  'Electricity':'need','Natural Gas':'need','Water':'need','Trash':'need','Sewer':'need','Internet':'need','Phone':'need','Utility Fees':'need',
  'Groceries':'need','Dining Out':'want','Fast Food':'want','Food Delivery':'want',
  'Amazon':'want','Clothing':'want','Electronics':'want','Retail':'want',
  'Car Payment':'need','Fuel':'need','Auto Insurance':'need','Maintenance':'need','Registration':'need','Parking':'want','Tolls':'need','Rideshare':'want',
  'Bars & Nightlife':'want','Movies':'want','Hobbies':'want','Events':'want','Flights':'want','Lodging':'want','Rentals':'want','Vacation Activities':'want',
  'Health Insurance':'need','Medical Bills':'need','Prescriptions':'need','Vision & Dental':'need','Therapy':'need','Fitness':'want','Hair':'want','Skin/Toiletries':'want',
  'Streaming':'want','Music':'want','Software/Apps':'want','Cloud Storage':'want','Memberships':'want','Other Subscriptions':'want',
  'Venmo':'want','Bank Fees':'need','Taxes':'need','Legal Fees':'need','Cash Withdrawals':'want','Gifts':'want','Donations':'want','Uncategorized':'want',
  'Loan payment':'debt','Investment/savings transfer':'savings',
  'Primary Paycheck':'income','Other Income':'income'
};
function subClassification(sub){
  if(!sub) return '';
  const ov=(S.settings && S.settings.subClass) ? S.settings.subClass[sub] : null;
  if(ov==='none') return '';
  return ov || SUB_CLASS[sub] || '';
}
/* Classification -> pill color, matched to the 50/30/20 chart
   (needs = blue, wants = amber/orange, savings & debt = green). */
const CLS_PILL={need:'blue',want:'amber',savings:'green',debt:'green',income:'teal',transfer:''};
function clsPill(cls){ return CLS_PILL[cls]||''; }
function cycleSubClass(sub, kind){
  const order = (kind==='transfer') ? ['debt','savings',''] : ['need','want'];
  const cur=subClassification(sub);
  const next=order[(order.indexOf(cur)+1+order.length)%order.length];
  if(!S.settings.subClass) S.settings.subClass={};
  S.settings.subClass[sub] = (next==='') ? 'none' : next;
  save(); render();
}
/* Subcategory → parent category. Subcategory names are unique in the taxonomy. */
function categoryForSub(sub){
  if(!sub) return '';
  const lc=String(sub).toLowerCase();
  // Transfer categories take priority so their subs always resolve to a wash.
  for(const c of S.categories){
    if(c.kind!=='transfer') continue;
    if((c.subs||[]).some(s=>String(s).toLowerCase()===lc)) return c.name;
  }
  if(TRANSFER_SUBS.indexOf(sub)>=0) return 'Transfers';  // legacy built-in names
  for(const c of S.categories){
    if(c.kind==='transfer') continue;
    if((c.subs||[]).some(s=>String(s).toLowerCase()===lc)) return c.name;
  }
  return 'Other';
}
/* <optgroup> list of every expense subcategory, grouped by category, for pickers. */
function subOptgroups(selected){
  return S.categories.filter(c=>c.kind!=='transfer').map(c=>
    `<optgroup label="${esc(c.name)}">`+
    (c.subs||[]).map(s=>`<option value="${esc(s)}" ${selected===s?'selected':''}>${esc(s)}</option>`).join('')+
    `</optgroup>`).join('') + transferOptgroup(selected);
}
/* Spending for one category, broken down by subcategory. Transactions with no
   subcategory are grouped under "(unspecified)" so nothing is silently dropped. */
function spendingBySub(txs, catName){
  const out={};
  txs.forEach(t=>{
    for(const L of budgetLines(t)){
      if(L.dir==='spending' && (L.category||'Uncategorized')===catName){
        const s=(L.subcategory&&L.subcategory.trim())? L.subcategory : '(unspecified)';
        out[s]=(out[s]||0)+L.amount;
      }
    }
  });
  return out;
}
/* All subcategory names known for a category: defined subs plus any seen in data. */
function knownSubs(catName){
  const c=S.categories.find(x=>x.name===catName);
  const defined=c?(c.subs||[]):[];
  const seen=new Set();
  S.transactions.forEach(t=>{ if((t.category||'')===catName && t.subcategory && t.subcategory.trim()) seen.add(t.subcategory); });
  return Array.from(new Set([...defined,...seen]));
}
function savingsRate(income,spending){ if(income<=0) return 0; return ((income-spending)/income)*100; }

/* Account balance = starting balance + signed transaction sum (expenses reduce, income increases).
   Convention: in our store, expense amounts are stored as positive "spending" with flow handling.
   To keep balances correct we store a signed `signedAmount` per tx (negative=outflow). */
function accountBalance(acct){
  let bal=Number(acct.startingBalance)||0;
  S.transactions.forEach(t=>{ if(t.accountId===acct.id) bal += signedAmount(t); });
  return bal;
}
function isIncomeTx(t){
  return t.kind==='income' || t.flow==='income' || t.category==='Income'
      || (t.subcategory && subClassification(t.subcategory)==='income');
}
/* Income always adds, expense always subtracts — derived from the transaction's
   nature, not a stored sign that can go stale after re-categorization. Transfers
   keep their bank-given direction since they can be either way. */
function signedAmount(t){
  const amt=Math.abs(Number(t.amount)||0);
  if(isTransfer(t)) return (t.signed!==undefined && t.signed!==null) ? Number(t.signed) : -amt;
  return isIncomeTx(t) ? amt : -amt;
}
/* Recompute and store t.signed consistently (used after categorization). */
function applySign(t){
  if(t.transfer || isTransfer(t)){ if(t.signed===undefined||t.signed===null) t.signed=-Math.abs(Number(t.amount)||0); return; }
  t.signed=(isIncomeTx(t)?1:-1)*Math.abs(Number(t.amount)||0);
}

/* =====================================================================
   CATEGORIZATION RULES ENGINE
   ===================================================================== */
function applyRules(tx){
  const sorted=[...S.rules].filter(r=>r.enabled!==false).sort((a,b)=>(a.order??0)-(b.order??0));
  for(const r of sorted){
    if(ruleMatches(r,tx)){
      if(r.subcategory){ tx.subcategory=r.subcategory; tx.category=categoryForSub(r.subcategory); }
      else if(r.category){ tx.category=r.category; }
      if(r.transfer){ tx.transfer=true; tx.category='Transfers'; }
      tx.ruleApplied=r.id;
      return true;
    }
  }
  return false;
}
function ruleMatches(r,tx){
  const norm=s=>String(s||'').toUpperCase().replace(/[^A-Z0-9]+/g,' ').replace(/\s+/g,' ').trim();
  const desc=norm((tx.description||'')+' '+(tx.merchant||''));
  if(r.field==='merchant' || r.field==='description'){
    const val=norm(r.value);
    if(r.matchType==='contains' && !desc.includes(val)) return false;
    if(r.matchType==='equals' && desc!==val) return false;
    if(r.matchType==='startsWith' && !desc.startsWith(val)) return false;
  }
  if(r.account && tx.accountId!==r.account) return false;
  if(r.amountMin!=null && r.amountMin!=='' && Math.abs(tx.amount) < Number(r.amountMin)) return false;
  if(r.amountMax!=null && r.amountMax!=='' && Math.abs(tx.amount) > Number(r.amountMax)) return false;
  if(r.txType && tx.txType && tx.txType!==r.txType) return false;
  return true;
}
function reapplyAllRules(){
  let n=0;
  S.transactions.forEach(t=>{ if(!t.manualCat){ if(applyRules(t)) n++; } });
  save(); return n;
}

/* Heuristic transfer / credit-card payment / recurring detection */
function looksLikeTransfer(desc){
  const d=(desc||'').toUpperCase();
  return /TRANSFER|XFER|TO SAVINGS|FROM SAVINGS|ONLINE BANKING TRANSFER|MOVE MONEY|ACH TRANSFER/.test(d);
}
function looksLikeCardPayment(desc){
  const d=(desc||'').toUpperCase();
  return /CREDIT CARD PAYMENT|CC ?PAYMENT|CARD ?PAYMENT|CCPYMT|CC ?PYMT|CRD ?PYMT|CARD ?PYMT|CARDMEMBER|EPAY|E PAYMENT|PAYMENT THANK YOU|AUTOPAY|BILL PAYMENT.*CARD|PAYMENT - THANK YOU/.test(d);
}
/* =====================================================================
   CSV IMPORT
   ===================================================================== */
function parseCSV(text){
  const rows=[]; let row=[], field='', q=false;
  text=text.replace(/^\uFEFF/,''); // strip BOM
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(q){
      if(c==='"' && n==='"'){ field+='"'; i++; }
      else if(c==='"'){ q=false; }
      else field+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else if(c==='\r'){ /* skip */ }
      else field+=c;
    }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(c=>String(c).trim()!==''));
}

function onCSVFile(ev){
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    const rows=parseCSV(rd.result);
    if(rows.length<2){ toast('CSV appears empty or has no data rows.','err'); return; }
    const headers=rows[0].map(h=>String(h).trim());
    const data=rows.slice(1);
    const inst=document.getElementById('impInst').value.trim();
    const remembered = inst && S.csvMappings[inst.toLowerCase()];
    const mapping = remembered ? {...remembered} : autoDetect(headers);

function autoDetect(headers){
  const find=(...keys)=>{ for(let i=0;i<headers.length;i++){ const h=headers[i].toLowerCase(); if(keys.some(k=>h.includes(k))) return i; } return -1; };
  return {
    date: find('transaction date','trans date','date','posted'),
    description: find('description','memo','name','payee','details'),
    merchant: find('merchant','payee'),
    amount: find('amount','value'),
    debit: find('debit','withdrawal','outflow'),
    credit: find('credit','deposit','inflow'),
    type: find('type','transaction type'),
    category: find('category'),
    balance: find('running balance','ending balance','balance')
  };
}

function mapRow(r,m){
  const get=i=>(i>=0 && i<r.length)? String(r[i]).trim() : '';
  let dateRaw=get(m.date);
  let date=normalizeDate(dateRaw);
  const desc=get(m.description) || get(m.merchant) || '(no description)';
  const merchant=get(m.merchant)||cleanMerchant(desc);
  let amount=null, kind='expense', signed=null;
  if(m.amount>=0){
    const a=parseNum(get(m.amount));
    signed=a;                       // bank convention: negative = outflow
    amount=Math.abs(a);
    kind = a>=0 ? 'income':'expense';
  } else if(m.debit>=0 || m.credit>=0){
    const deb=parseNum(get(m.debit)), cred=parseNum(get(m.credit));
    if(cred>0){ amount=cred; kind='income'; signed=cred; }
    else { amount=deb; kind='expense'; signed=-deb; }
  }
  const type=get(m.type);
  const csvCat=get(m.category);
  const bankBalance=(m.balance!=null && m.balance>=0 && get(m.balance)!=='') ? parseNum(get(m.balance)) : null;
  return {date,description:desc,merchant,amount,kind,signed,txType:type,csvCat,bankBalance,raw:r};
}
function normalizeDate(s){
  if(!s) return '';
  s=s.trim();
  // ISO
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  // MM/DD/YYYY or M/D/YY
  let m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){ let [_,a,b,y]=m; if(y.length===2) y='20'+y; return `${y}-${a.padStart(2,'0')}-${b.padStart(2,'0')}`; }
  const d=new Date(s); if(!isNaN(d)) return toISODate(d);
  return '';
}
function cleanMerchant(desc){
  return String(desc).replace(/\s{2,}/g,' ').replace(/#\d+.*$/,'').replace(/\d{4,}/g,'').trim().slice(0,40) || desc;
}
function txFingerprint(accountId,date,desc,amount){
  return [accountId,date,String(desc).toUpperCase().replace(/\s+/g,' ').trim().slice(0,40),Math.abs(Number(amount)||0).toFixed(2)].join('|');
}
function scanDuplicates(rows,m){
  const existing=new Map();
  S.transactions.forEach(t=>{ const k=txFingerprint(importCtx.accountId,t.date,t.description,t.amount); existing.set(k,(existing.get(k)||0)+1); });
  let dupes=0,bad=0;
  rows.forEach(r=>{
    const p=mapRow(r,m);
    if(!p.date || p.amount==null){ bad++; return; }
    const fp=txFingerprint(importCtx.accountId,p.date,p.description,p.amount);
    if((existing.get(fp)||0)>0){ existing.set(fp,existing.get(fp)-1); dupes++; }
  });
  return {dupes,bad};
}

function runImport(){
  const {rows,mapping,accountId,institution}=importCtx;
  const existing=new Map();
  S.transactions.forEach(t=>{ const k=txFingerprint(t.accountId,t.date,t.description,t.amount); existing.set(k,(existing.get(k)||0)+1); });
  let imported=0,skipped=0,bad=0;
  const importDate=toISODate(new Date());
  const acct=S.accounts.find(a=>a.id===accountId);
  rows.forEach(r=>{
    const p=mapRow(r,mapping);
    if(!p.date || p.amount==null){ bad++; return; }
    const fp=txFingerprint(accountId,p.date,p.description,p.amount);
    if((existing.get(fp)||0)>0){ existing.set(fp,existing.get(fp)-1); skipped++; return; }
    const t={
      id:uid('tx'), accountId, date:p.date, description:p.description, originalDescription:p.description,
      merchant:p.merchant, amount:p.amount, signed:p.signed, kind:p.kind, txType:p.txType||'',
      category: p.kind==='income'?'Income':'', subcategory:'', flow:p.kind,
      transfer:false, recurring:false, notes:'', tags:[], splits:[],
      importSource: institution||'CSV', importDate, manualCat:false,
      bankBalance: (p.bankBalance!=null ? p.bankBalance : null)
    };
    // credit-card payment / transfer heuristics
    if(looksLikeCardPayment(p.description) || (acct && acct.type==='credit' && p.kind==='income' && looksLikeTransfer(p.description))){
      t.transfer=true; t.category='Transfers'; t.subcategory=transferSubLike(/credit\s*card/i,'Credit card payment');
    } else if(looksLikeTransfer(p.description)){
      t.transfer=true; t.category='Transfers'; t.subcategory=transferSubLike(/account/i,'Account transfer');
    } else {
      applyRules(t);  // a matching rule sets subcategory + derives category
      // Rules can elect per-match behaviors, applied at import time only so
      // deliberate per-transaction changes are never overridden by a re-apply.
      if(t.ruleApplied){
        const fr=S.rules.find(r=>r.id===t.ruleApplied);
        if(fr && fr.flagReview) t.needsReview=true;
        if(fr && fr.markRecurring) t.recurring=true;
      }
      if(!t.subcategory && p.csvCat){ const sub=mapCsvSub(p.csvCat); if(sub){ t.subcategory=sub; t.category=categoryForSub(sub); } }
      if(p.kind==='income' && !t.category) t.category='Income';
    }
    S.transactions.push(t);
    imported++;
  });
  if(institution){ S.csvMappings[institution.toLowerCase()]={...mapping}; }
  if(acct){ acct.lastUpdated=importDate; }
  save(); closeModal();
  toast(`Imported ${imported} · skipped ${skipped} duplicate(s)${bad?` · ${bad} unreadable`:''}`, imported?'ok':'warn');
  render();
}
function mapCsvSub(c){
  if(!c) return '';
  const lc=String(c).trim().toLowerCase();
  for(const cat of S.categories){ if(cat.kind==='transfer') continue; const hit=(cat.subs||[]).find(s=>s.toLowerCase()===lc); if(hit) return hit; }
  return '';
}
function mapCsvCategory(c){ return mapCsvSub(c); }

let _sheetGesturesInit=false;
function initSheetGestures(){
  if(_sheetGesturesInit) return;
  const sheet=document.getElementById('moreSheet'), scrim=document.getElementById('sheetScrim');
  if(!sheet||!scrim) return;
  _sheetGesturesInit=true;
  let startY=0, dy=0, dragging=false;
  sheet.addEventListener('touchstart',e=>{
    if(sheet.scrollTop>0){ dragging=false; return; }   // let inner content scroll first
    startY=e.touches[0].clientY; dy=0; dragging=true; sheet.style.transition='none';
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!dragging) return;
    dy=e.touches[0].clientY-startY;
    if(dy>0){ e.preventDefault(); sheet.style.transform='translateY('+dy+'px)'; }   // follow finger, block bg scroll
  },{passive:false});
  const end=()=>{
    if(!dragging) return; dragging=false; sheet.style.transition='';
    if(dy>90){ closeMoreSheet(); } else { sheet.style.transform='translateY(0)'; }
  };
  sheet.addEventListener('touchend',end);
  sheet.addEventListener('touchcancel',end);
  scrim.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});  // no scrolling through the backdrop
}
function openMoreSheet(){
  buildMoreSheet(); initSheetGestures();
  const s=document.getElementById('moreSheet');
  const sy=window.scrollY||window.pageYOffset||0;
  document.body.dataset.sheetScroll=sy;
  document.body.style.top=(-sy)+'px';
  document.body.classList.add('sheet-open');
  document.getElementById('sheetScrim').classList.add('show');
  s.classList.add('show'); s.style.transform='translateY(0)';
}
function closeMoreSheet(){
  const s=document.getElementById('moreSheet');
  document.getElementById('sheetScrim').classList.remove('show');
  if(s){ s.classList.remove('show'); s.style.transform=''; }
  if(document.body.classList.contains('sheet-open')){
    const sy=parseInt(document.body.dataset.sheetScroll||'0',10);
    document.body.classList.remove('sheet-open'); document.body.style.top='';
    window.scrollTo(0,sy);
  }
}

  if(!window.Chart) return;

  // to Chart.js's default 2:1 aspect ratio — otherwise full-width cards leave

  Chart.defaults.color = cvar('--muted')||'#64748b';
